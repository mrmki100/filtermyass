name: Download Videos V4 Fixed Fast

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: download-videos
  cancel-in-progress: false

jobs:
  download:
    runs-on: ubuntu-latest

    container:
      image: mcr.microsoft.com/playwright/python:v1.59.0-noble

    timeout-minutes: 360

    defaults:
      run:
        shell: bash

    steps:

      ##################################################
      # CHECKOUT
      ##################################################

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      ##################################################
      # DEBUG ENVIRONMENT
      ##################################################

      - name: Debug environment
        run: |

          echo "================================="
          echo "SYSTEM INFO"
          echo "================================="

          whoami
          pwd

          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"

          ls -la
          df -h

      ##################################################
      # FIX CACHE PERMISSIONS
      ##################################################

      - name: Fix cache permissions
        run: |

          mkdir -p /github/home/.cache/pip

          chmod -R 777 /github/home/.cache

      ##################################################
      # CACHE PIP
      ##################################################

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: /github/home/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      ##################################################
      # CACHE PLAYWRIGHT
      ##################################################

      - name: Cache Playwright
        uses: actions/cache@v4
        with:
          path: /ms-playwright
          key: playwright-${{ runner.os }}

      ##################################################
      # INSTALL TOOLS
      ##################################################

      - name: Install tools
        run: |

          apt-get update

          apt-get install -y --no-install-recommends \
            ffmpeg \
            aria2 \
            jq \
            wget \
            curl \
            p7zip-full

      ##################################################
      # PYTHON INFO
      ##################################################

      - name: Python info
        run: |

          python --version
          pip --version

      ##################################################
      # INSTALL PYTHON PACKAGES
      ##################################################

      - name: Install Python packages
        run: |

          pip install --upgrade pip

          pip install \
            yt-dlp \
            requests \
            aiohttp

      ##################################################
      # CREATE FOLDERS
      ##################################################

      - name: Create folders
        run: |

          mkdir -p downloads
          mkdir -p temp

      ##################################################
      # SHOW INPUT FILES
      ##################################################

      - name: Show input files
        run: |

          echo "================================="
          echo "FILES"
          echo "================================="

          ls -la

          echo "================================="
          echo "urls.txt"
          echo "================================="

          cat urls.txt || true

          echo "================================="
          echo "m3u8.txt"
          echo "================================="

          cat m3u8.txt || true

      ##################################################
      # DOWNLOAD NORMAL URLS
      ##################################################

      - name: Download videos
        run: |

          set -e

          if [ ! -f urls.txt ]; then
            echo "urls.txt not found"
            exit 0
          fi

          while IFS= read -r url || [ -n "$url" ]; do

            url=$(echo "$url" | xargs)

            [ -z "$url" ] && continue

            echo "================================="
            echo "DOWNLOADING VIDEO"
            echo "$url"
            echo "================================="

            yt-dlp \
              --ignore-errors \
              --no-progress \
              --continue \
              --retries 20 \
              --fragment-retries 20 \
              --file-access-retries 20 \
              --concurrent-fragments 4 \
              --extractor-retries 20 \
              --retry-sleep 5 \
              --no-part \
              --merge-output-format mp4 \
              --restrict-filenames \
              -o "downloads/%(title)s.%(ext)s" \
              "$url"

          done < urls.txt

      ##################################################
      # DOWNLOAD HLS / M3U8
      ##################################################

      - name: Download HLS streams
        run: |

          set -e

          if [ ! -f m3u8.txt ]; then
            echo "m3u8.txt not found"
            exit 0
          fi

          while IFS= read -r url || [ -n "$url" ]; do

            url=$(echo "$url" | xargs)

            [ -z "$url" ] && continue

            echo "================================="
            echo "PROCESSING M3U8"
            echo "$url"
            echo "================================="

            CLEAN_URL=$(echo "$url" | grep -viE 'low|preview' || true)

            if [ -z "$CLEAN_URL" ]; then
              echo "Skipped filtered URL"
              continue
            fi

            yt-dlp \
              --ignore-errors \
              --no-progress \
              --continue \
              --retries 20 \
              --fragment-retries 20 \
              --file-access-retries 20 \
              --concurrent-fragments 4 \
              --extractor-retries 20 \
              --retry-sleep 5 \
              --hls-use-mpegts \
              --merge-output-format mp4 \
              --restrict-filenames \
              -o "downloads/%(title)s.%(ext)s" \
              "$CLEAN_URL"

          done < m3u8.txt

      ##################################################
      # SHOW RESULTS
      ##################################################

      - name: Show results
        run: |

          echo "================================="
          echo "DOWNLOADED FILES"
          echo "================================="

          find downloads -type f || true

          echo "================================="
          echo "DOWNLOAD SIZE"
          echo "================================="

          du -sh downloads || true

      ##################################################
      # VERIFY GIT REPOSITORY
      ##################################################

      - name: Verify git repository
        run: |

          echo "================================="
          echo "VERIFY GIT"
          echo "================================="

          cd "$GITHUB_WORKSPACE"

          pwd

          ls -la

          if [ ! -d ".git" ]; then
            echo "ERROR: .git directory not found"
            exit 1
          fi

          git status

      ##################################################
      # COMMIT DOWNLOADS
      ##################################################

      - name: Commit downloads
        run: |

          set -e

          echo "================================="
          echo "COMMIT STEP"
          echo "================================="

          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"

          cd "$GITHUB_WORKSPACE"

          pwd

          ls -la

          if [ ! -d ".git" ]; then
            echo "ERROR: .git folder not found"
            exit 1
          fi

          ################################################
          # FIX SAFE DIRECTORY
          ################################################

          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          ################################################
          # CONFIGURE GIT
          ################################################

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          ################################################
          # STATUS
          ################################################

          git status

          ################################################
          # ENSURE FOLDER EXISTS
          ################################################

          mkdir -p downloads

          ################################################
          # ADD FILES
          ################################################

          git add downloads || true

          ################################################
          # COMMIT ONLY IF CHANGED
          ################################################

          if git diff --cached --quiet; then

            echo "No changes to commit"

          else

            git commit -m "videos downloaded"

            git push

          fi

      ##################################################
      # FINAL STATUS
      ##################################################

      - name: Final status
        run: |

          echo "================================="
          echo "FINAL GIT STATUS"
          echo "================================="

          cd "$GITHUB_WORKSPACE"

          git status || true
