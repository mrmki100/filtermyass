name: Ultimate Video Downloader V5

on:
  workflow_dispatch:
    inputs:
      url1:
        description: "Video URL 1"
        required: false
      url2:
        description: "Video URL 2"
        required: false
      url3:
        description: "Video URL 3"
        required: false
      url4:
        description: "Video URL 4"
        required: false
      url5:
        description: "Video URL 5"
        required: false

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:

    ############################################################
    # CHECKOUT
    ############################################################

    - uses: actions/checkout@v4

    ############################################################
    # INSTALL
    ############################################################

    - name: Install dependencies
      run: |

        python3 -m pip install --upgrade pip

        pip install \
          yt-dlp \
          playwright \
          requests

        sudo apt-get update

        sudo apt-get install -y \
          ffmpeg \
          jq \
          curl \
          wget \
          mediainfo \
          p7zip-full

        playwright install chromium

    ############################################################
    # URLS
    ############################################################

    - name: Prepare URLs
      run: |

        cat > urls.txt <<EOF
        ${{ github.event.inputs.url1 }}
        ${{ github.event.inputs.url2 }}
        ${{ github.event.inputs.url3 }}
        ${{ github.event.inputs.url4 }}
        ${{ github.event.inputs.url5 }}
        EOF

        sed -i '/^$/d' urls.txt

    ############################################################
    # PLAYWRIGHT INTERCEPTOR
    ############################################################

    - name: Create interceptor
      run: |

        cat > interceptor.py << 'PY'
        import json
        import sys
        from playwright.sync_api import sync_playwright

        target=sys.argv[1]

        found=[]

        BAD=[
            "ads",
            "doubleclick",
            "analytics",
            "banner",
            "sprite",
            "thumb",
            "preview",
            "trailer",
            "logo"
        ]

        def bad(url):
            u=url.lower()
            return any(x in u for x in BAD)

        with sync_playwright() as p:

            browser=p.chromium.launch(
                headless=True
            )

            context=browser.new_context(
                viewport={"width":1920,"height":1080},
                user_agent="Mozilla/5.0"
            )

            page=context.new_page()

            def on_response(r):

                try:

                    url=r.url
                    ct=r.headers.get("content-type","")

                    if bad(url):
                        return

                    if (
                        ".m3u8" in url
                        or ".mp4" in url
                        or "mpegurl" in ct
                        or "video" in ct
                        or "manifest" in url
                    ):

                        found.append({
                            "url":url,
                            "content_type":ct
                        })

                except:
                    pass

            page.on("response", on_response)

            page.goto(
                target,
                timeout=120000,
                wait_until="networkidle"
            )

            try:
                page.locator("video").click(timeout=5000)
            except:
                pass

            try:
                page.mouse.click(800,400)
            except:
                pass

            page.wait_for_timeout(25000)

            cookies=context.cookies()

            print(json.dumps({
                "media":found,
                "cookies":cookies
            }))

            browser.close()
        PY

    ############################################################
    # NORMALIZER
    ############################################################

    - name: Create stream normalizer
      run: |

        cat > normalize.py << 'PY'
        import re
        import sys

        url=sys.argv[1]

        original=url

        # REMOVE SPACES
        url=url.strip()

        # REMOVE DUPLICATES
        url=url.replace(",,",",")

        # HELLO.PORN HYBRID PLAYLIST
        m=re.search(
            r'(.*/)(\d+),_360p\.mp4,\.mp4,_720p\.mp4,',
            url
        )

        if m:

            base=m.group(1)
            vid=m.group(2)

            candidates=[

                f"{base}{vid}_720p.mp4/index-v1-a1.m3u8",
                f"{base}{vid}.mp4/index-v1-a1.m3u8",
                f"{base}{vid}_360p.mp4/index-v1-a1.m3u8"

            ]

            for c in candidates:
                print(c)

        else:
            print(original)
        PY

    ############################################################
    # MAIN DOWNLOAD
    ############################################################

    - name: Download videos
      run: |

        mkdir -p downloads

        while IFS= read -r URL
        do

        (
          echo "======================================"
          echo "PROCESSING: $URL"
          echo "======================================"

          TS=$(date +"%Y-%m-%d_%H-%M-%S")_$RANDOM

          DIR="downloads/$TS"

          mkdir -p "$DIR"

          ######################################################
          # STEP 1 - TRY NORMAL YT-DLP
          ######################################################

          echo "STEP 1: NORMAL EXTRACTION"

          yt-dlp \
            --no-playlist \
            --extractor-retries 20 \
            --fragment-retries 50 \
            --retries 50 \
            --concurrent-fragments 8 \
            --user-agent "Mozilla/5.0" \
            --merge-output-format mp4 \
            --format-sort "res:1080,fps,vcodec:h264" \
            -f "bestvideo[height<=1080]+bestaudio/best[height<=1080]" \
            -o "$DIR/%(title).150s_%(id)s.%(ext)s" \
            "$URL" || true

          ######################################################
          # CHECK RESULT
          ######################################################

          FILE=$(find "$DIR" -type f -iname "*.mp4" | head -n1 || true)

          VALID=0

          if [ ! -z "$FILE" ]; then

            SIZE=$(stat -c%s "$FILE")

            echo "FOUND FILE SIZE=$SIZE"

            if [ "$SIZE" -gt 5000000 ]; then
              VALID=1
            fi

          fi

          ######################################################
          # HARD MODE
          ######################################################

          if [ $VALID -eq 0 ]; then

            echo "STEP 2: HARD MODE"

            rm -f "$DIR"/*.mp4 || true

            ##################################################
            # INTERCEPT TRAFFIC
            ##################################################

            python3 interceptor.py "$URL" > "$DIR/data.json"

            ##################################################
            # EXPORT COOKIES
            ##################################################

            cat "$DIR/data.json" \
            | jq -r '.cookies[] |
            "\(.domain)\tTRUE\t/\tFALSE\t0\t\(.name)\t\(.value)"' \
            > "$DIR/cookies.txt"

            ##################################################
            # EXTRACT RAW URLS
            ##################################################

            cat "$DIR/data.json" \
            | jq -r '.media[].url' \
            | sort -u \
            > "$DIR/raw_urls.txt"

            ##################################################
            # NORMALIZE STREAMS
            ##################################################

            touch "$DIR/all_streams.txt"

            while read U
            do

              [ -z "$U" ] && continue

              python3 normalize.py "$U" \
              >> "$DIR/all_streams.txt"

            done < "$DIR/raw_urls.txt"

            sort -u "$DIR/all_streams.txt" \
            > "$DIR/streams.txt"

            ##################################################
            # FILTER VALID STREAMS
            ##################################################

            grep -Ei '\.m3u8' "$DIR/streams.txt" \
            | grep -viE 'preview|sprite|thumb|ads|trailer' \
            > "$DIR/m3u8.txt" || true

            ##################################################
            # TEST STREAMS
            ##################################################

            SUCCESS=0

            while read M
            do

              [ -z "$M" ] && continue

              echo "================================="
              echo "TESTING STREAM"
              echo "$M"
              echo "================================="

              ################################################
              # VERIFY PLAYLIST
              ################################################

              curl \
                -L \
                -A "Mozilla/5.0" \
                --connect-timeout 20 \
                --max-time 60 \
                "$M" \
                -o "$DIR/test.m3u8" || continue

              ################################################
              # CHECK CONTENT
              ################################################

              if ! grep -q "#EXTM3U" "$DIR/test.m3u8"; then
                echo "NOT M3U8"
                continue
              fi

              ################################################
              # DETECT QUALITY
              ################################################

              if grep -q "RESOLUTION=1280x720" "$DIR/test.m3u8"; then
                echo "720P STREAM FOUND"
              fi

              if grep -q "RESOLUTION=1920x1080" "$DIR/test.m3u8"; then
                echo "1080P STREAM FOUND"
              fi

              ################################################
              # DOWNLOAD STREAM
              ################################################

              yt-dlp \
                --cookies "$DIR/cookies.txt" \
                --referer "$URL" \
                --user-agent "Mozilla/5.0" \
                --extractor-retries 30 \
                --fragment-retries 100 \
                --retries 100 \
                --skip-unavailable-fragments \
                --hls-use-mpegts \
                --concurrent-fragments 10 \
                --merge-output-format mp4 \
                -f "bestvideo+bestaudio/best" \
                -o "$DIR/final.%(ext)s" \
                "$M"

              FILE=$(find "$DIR" -type f -iname "*.mp4" | head -n1 || true)

              if [ ! -z "$FILE" ]; then

                SIZE=$(stat -c%s "$FILE")

                echo "DOWNLOADED SIZE=$SIZE"

                if [ "$SIZE" -gt 5000000 ]; then

                  echo "SUCCESS"
                  SUCCESS=1
                  break

                fi

              fi

            done < "$DIR/m3u8.txt"

            ##################################################
            # DIRECT FFMPEG FALLBACK
            ##################################################

            if [ $SUCCESS -eq 0 ]; then

              echo "STEP 3: FFMPEG FALLBACK"

              while read M
              do

                [ -z "$M" ] && continue

                ffmpeg \
                  -headers "Referer: $URL" \
                  -user_agent "Mozilla/5.0" \
                  -i "$M" \
                  -c copy \
                  -bsf:a aac_adtstoasc \
                  "$DIR/ffmpeg_output.mp4" \
                  -y || true

                FILE="$DIR/ffmpeg_output.mp4"

                if [ -f "$FILE" ]; then

                  SIZE=$(stat -c%s "$FILE")

                  if [ "$SIZE" -gt 5000000 ]; then
                    SUCCESS=1
                    break
                  fi

                fi

              done < "$DIR/m3u8.txt"

            fi

          fi

          ######################################################
          # FINAL VALIDATION
          ######################################################

          FILE=$(find "$DIR" -type f -iname "*.mp4" | head -n1 || true)

          if [ ! -z "$FILE" ]; then

            echo "FINAL VALIDATION"

            mediainfo "$FILE" \
            > "$DIR/media_info.txt" || true

            SIZE=$(stat -c%s "$FILE")

            DURATION=$(mediainfo \
              --Inform="General;%Duration%" \
              "$FILE" || echo 0)

            echo "SIZE=$SIZE"
            echo "DURATION=$DURATION"

            if [ "$SIZE" -lt 5000000 ]; then

              echo "BAD FILE REMOVED"

              rm -f "$FILE"

            fi

          fi

          ######################################################
          # SPLIT LARGE FILES
          ######################################################

          FILE=$(find "$DIR" -type f -iname "*.mp4" | head -n1 || true)

          if [ ! -z "$FILE" ]; then

            SIZE=$(stat -c%s "$FILE")

            if [ "$SIZE" -gt 95000000 ]; then

              echo "SPLITTING LARGE FILE"

              7z a \
                -v90m \
                "$DIR/video.7z" \
                "$FILE"

              rm -f "$FILE"

            fi

          fi

        ) &

        done < urls.txt

        wait

    ############################################################
    # PUSH RESULTS
    ############################################################

    - name: Upload downloaded files
      run: |

        git config user.name github-actions
        git config user.email github-actions@github.com

        git add downloads

        git commit -m "downloaded videos" \
        || echo "nothing to commit"

        git push
