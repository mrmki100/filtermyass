name: Video Downloader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "Video URLs (one per line)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install yt-dlp
      run: |
        python3 -m pip install --upgrade pip
        pip install yt-dlp
        sudo apt-get update
        sudo apt-get install -y p7zip-full

    - name: Process all URLs
      run: |
        echo "${{ github.event.inputs.urls }}" > urls.txt

        while IFS= read -r url
        do
          if [ -z "$url" ]; then
            continue
          fi

          echo "Processing $url"

          ts=$(date +"%Y-%m-%d_%H-%M-%S")
          DL_DIR="downloads/$ts"
          mkdir -p "$DL_DIR"

          yt-dlp -o "$DL_DIR/video.%(ext)s" "$url"

          FILE=$(ls "$DL_DIR" | head -n 1 || true)

          if [ -z "$FILE" ]; then
            echo "Download failed for $url"
            continue
          fi

          cd "$DL_DIR"

          FILESIZE=$(stat -c%s "$FILE")

          if [ $FILESIZE -gt 100000000 ]; then
            echo "Splitting large file..."
            7z a -v90m "archive.7z" "$FILE"
            rm "$FILE"
          fi

          cd ../../

          sleep 2

        done < urls.txt

    - name: Commit and push
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add downloads
        git commit -m "Add downloaded videos" || echo "Nothing to commit"
        git push
