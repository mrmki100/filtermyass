name: Ultimate Video Downloader V4

on:
  workflow_dispatch:
    inputs:
      url1:
        description: "Video URL 1"
        required: false
      url2:
        description: "Video URL 2"
        required: false
      url3:
        description: "Video URL 3"
        required: false
      url4:
        description: "Video URL 4"
        required: false
      url5:
        description: "Video URL 5"
        required: false

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:

    - uses: actions/checkout@v4

    ############################################################
    # INSTALL
    ############################################################

    - name: Install dependencies
      run: |

        python3 -m pip install --upgrade pip

        pip install \
          yt-dlp \
          playwright

        sudo apt-get update

        sudo apt-get install -y \
          ffmpeg \
          jq \
          wget \
          curl \
          p7zip-full \
          mediainfo

        playwright install chromium

    ############################################################
    # URLS
    ############################################################

    - name: Prepare URLs
      run: |

        cat > urls.txt <<EOF
        ${{ github.event.inputs.url1 }}
        ${{ github.event.inputs.url2 }}
        ${{ github.event.inputs.url3 }}
        ${{ github.event.inputs.url4 }}
        ${{ github.event.inputs.url5 }}
        EOF

        sed -i '/^$/d' urls.txt

    ############################################################
    # PLAYWRIGHT INTERCEPTOR
    ############################################################

    - name: Create advanced interceptor
      run: |

        cat > interceptor.py << 'PY'
        import json
        import time
        import sys
        from playwright.sync_api import sync_playwright

        TARGET=sys.argv[1]

        media=[]
        xhrs=[]

        BAD_WORDS=[
            "ads",
            "doubleclick",
            "jerkmate",
            "adtng",
            "banner",
            "sprite",
            "thumb",
            "preview",
            "trailer",
            "analytics"
        ]

        GOOD_WORDS=[
            ".m3u8",
            ".mp4",
            ".mpd",
            "videoplayback",
            "manifest"
        ]

        def is_bad(url):
            u=url.lower()
            return any(x in u for x in BAD_WORDS)

        def is_good(url):
            u=url.lower()
            return any(x in u for x in GOOD_WORDS)

        with sync_playwright() as p:

            browser = p.chromium.launch(
                headless=True
            )

            context = browser.new_context(
                viewport={"width":1920,"height":1080},
                user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/122 Safari/537.36"
            )

            page=context.new_page()

            def on_response(r):

                try:

                    url=r.url
                    headers=r.headers
                    ctype=headers.get("content-type","")

                    item={
                        "url":url,
                        "content_type":ctype
                    }

                    xhrs.append(item)

                    if is_bad(url):
                        return

                    if is_good(url) or "video" in ctype or "mpegurl" in ctype:
                        media.append(item)

                except:
                    pass

            page.on("response", on_response)

            page.goto(
                TARGET,
                timeout=120000,
                wait_until="networkidle"
            )

            try:
                page.locator("video").click(timeout=5000)
            except:
                pass

            try:
                page.mouse.click(800,400)
            except:
                pass

            page.wait_for_timeout(25000)

            cookies=context.cookies()

            result={
                "media":media,
                "xhrs":xhrs,
                "cookies":cookies
            }

            print(json.dumps(result))

            browser.close()
        PY

    ############################################################
    # MAIN
    ############################################################

    - name: Download
      run: |

        mkdir -p downloads

        while IFS= read -r URL
        do

        (
          echo "=================================="
          echo "PROCESSING $URL"
          echo "=================================="

          TS=$(date +"%Y-%m-%d_%H-%M-%S")_$RANDOM

          DIR="downloads/$TS"

          mkdir -p "$DIR"

          ######################################################
          # FIRST TRY YT-DLP
          ######################################################

          echo "NORMAL EXTRACTION"

          yt-dlp \
            --no-playlist \
            --extractor-retries 10 \
            --fragment-retries 20 \
            --retries 20 \
            --concurrent-fragments 8 \
            --user-agent "Mozilla/5.0" \
            --merge-output-format mp4 \
            --format-sort "res:1080,fps,hdr:12,vcodec:h264" \
            -f "bestvideo[height<=1080]+bestaudio/best[height<=1080]" \
            -o "$DIR/%(title).120s_%(id)s.%(ext)s" \
            "$URL" || true

          FILE=$(find "$DIR" -iname "*.mp4" | head -n1 || true)

          SIZE=0

          if [ ! -z "$FILE" ]; then
            SIZE=$(stat -c%s "$FILE")
          fi

          ######################################################
          # HARD MODE
          ######################################################

          if [ -z "$FILE" ] || [ "$SIZE" -lt 5000000 ]; then

            echo "ENTER HARD MODE"

            rm -f "$DIR"/*.mp4 || true

            ##################################################
            # CAPTURE
            ##################################################

            python3 interceptor.py "$URL" > "$DIR/data.json"

            ##################################################
            # COOKIES
            ##################################################

            cat "$DIR/data.json" \
              | jq -r '.cookies[] |
              "\(.domain)\tTRUE\t/\tFALSE\t0\t\(.name)\t\(.value)"' \
              > "$DIR/cookies.txt"

            ##################################################
            # ALL URLS
            ##################################################

            cat "$DIR/data.json" \
              | jq -r '.media[].url' \
              | sort -u \
              > "$DIR/all_media.txt"

            ##################################################
            # DRM DETECTION
            ##################################################

            if grep -Ei 'widevine|drm|fairplay|license' "$DIR/all_media.txt"
            then
              echo "DRM DETECTED" > "$DIR/DRM.txt"
            fi

            ##################################################
            # FILTER STREAMS
            ##################################################

            grep -Ei '\.m3u8|manifest' "$DIR/all_media.txt" \
              | grep -viE 'preview|trailer|clip|sprite|thumb|ads' \
              > "$DIR/m3u8.txt" || true

            grep -Ei '\.mp4' "$DIR/all_media.txt" \
              | grep -viE 'preview|trailer|clip|sprite|thumb|ads' \
              > "$DIR/mp4.txt" || true

            SUCCESS=0

            ##################################################
            # TEST M3U8 STREAMS
            ##################################################

            while read M
            do

              [ -z "$M" ] && continue

              echo "TEST STREAM $M"

              yt-dlp \
                --cookies "$DIR/cookies.txt" \
                --referer "$URL" \
                --dump-json \
                "$M" \
                > "$DIR/info.json" 2>/dev/null || continue

              DUR=$(cat "$DIR/info.json" | jq '.duration // 0')

              echo "DURATION=$DUR"

              if [ "$DUR" -lt 1200 ]; then
                echo "SKIP SHORT STREAM"
                continue
              fi

              echo "DOWNLOAD FULL STREAM"

              yt-dlp \
                --cookies "$DIR/cookies.txt" \
                --referer "$URL" \
                --user-agent "Mozilla/5.0" \
                --hls-use-mpegts \
                --extractor-retries 20 \
                --fragment-retries 50 \
                --retries 50 \
                --concurrent-fragments 10 \
                --merge-output-format mp4 \
                --format-sort "res:1080,fps,vcodec:h264" \
                -f "bestvideo[height<=1080]+bestaudio/best[height<=1080]" \
                -o "$DIR/full.%(ext)s" \
                "$M" && SUCCESS=1 && break

            done < "$DIR/m3u8.txt"

            ##################################################
            # MP4 FALLBACK
            ##################################################

            if [ $SUCCESS -eq 0 ]; then

              while read M
              do

                [ -z "$M" ] && continue

                echo "TRY MP4 $M"

                wget \
                  --load-cookies "$DIR/cookies.txt" \
                  --referer="$URL" \
                  --user-agent="Mozilla/5.0" \
                  -O "$DIR/video.mp4" \
                  "$M" && SUCCESS=1 && break

              done < "$DIR/mp4.txt"

            fi

          fi

          ######################################################
          # VALIDATION
          ######################################################

          FILE=$(find "$DIR" -iname "*.mp4" | head -n1 || true)

          if [ ! -z "$FILE" ]; then

            echo "VALIDATE FILE"

            mediainfo "$FILE" > "$DIR/media_info.txt" || true

            SIZE=$(stat -c%s "$FILE")

            echo "SIZE=$SIZE"

            if [ "$SIZE" -lt 5000000 ]; then
              echo "BAD FILE"
              rm -f "$FILE"
            fi

          fi

          ######################################################
          # SPLIT LARGE FILES
          ######################################################

          FILE=$(find "$DIR" -iname "*.mp4" | head -n1 || true)

          if [ ! -z "$FILE" ]; then

            SIZE=$(stat -c%s "$FILE")

            if [ "$SIZE" -gt 95000000 ]; then

              echo "SPLIT LARGE FILE"

              7z a -v90m "$DIR/video.7z" "$FILE"

              rm "$FILE"

            fi

          fi

        ) &

        done < urls.txt

        wait

    ############################################################
    # SAVE
    ############################################################

    - name: Commit files
      run: |

        git config user.name github-actions
        git config user.email github-actions@github.com

        git add downloads

        git commit -m "downloaded videos" || echo "nothing"

        git push
