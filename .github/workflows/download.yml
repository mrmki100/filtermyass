name: Video Downloader V4 Fixed Fast

on:
  workflow_dispatch:
    inputs:
      url1:
        description: "Video URL 1"
        required: false
      url2:
        description: "Video URL 2"
        required: false
      url3:
        description: "Video URL 3"
        required: false
      url4:
        description: "Video URL 4"
        required: false
      url5:
        description: "Video URL 5"
        required: false

permissions:
  contents: write

jobs:
  download:

    runs-on: ubuntu-latest

    timeout-minutes: 360

    container:
      image: mcr.microsoft.com/playwright/python:v1.59.0-noble

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    ############################################
    # CACHE PIP
    ############################################

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-v4fixed-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-v4fixed-

    ############################################
    # CACHE PLAYWRIGHT
    ############################################

    - name: Cache Playwright
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-v4fixed

    ############################################
    # REQUIREMENTS
    ############################################

    - name: Create requirements
      run: |
        cat > requirements.txt <<EOF
        yt-dlp
        playwright
        EOF

    ############################################
    # INSTALL PYTHON PACKAGES
    ############################################

    - name: Install python packages
      run: |
        python3 -m pip install --upgrade pip
        pip install -r requirements.txt

    ############################################
    # INSTALL ONLY NEEDED PACKAGE
    ############################################

    - name: Install minimal tools
      run: |
        apt-get update
        apt-get install -y --no-install-recommends p7zip-full jq

    ############################################
    # INSTALL PLAYWRIGHT BROWSER
    ############################################

    - name: Install chromium
      run: |
        playwright install chromium

    ############################################
    # PREPARE URLS
    ############################################

    - name: Prepare URLs
      run: |

        cat > urls.txt <<EOF
        ${{ github.event.inputs.url1 }}
        ${{ github.event.inputs.url2 }}
        ${{ github.event.inputs.url3 }}
        ${{ github.event.inputs.url4 }}
        ${{ github.event.inputs.url5 }}
        EOF

        sed -i '/^$/d' urls.txt

        echo "URLS:"
        cat urls.txt

    ############################################
    # CREATE INTERCEPTOR
    ############################################

    - name: Create interceptor
      run: |

        cat > intercept.py << 'PY'

        import sys
        import json

        from playwright.sync_api import sync_playwright

        url = sys.argv[1]

        media = []

        def valid(u):

            good = [
                ".m3u8",
                ".mp4",
                ".mpd",
                "playlist",
                "manifest",
                "videoplayback"
            ]

            bad = [
                ".jpg",
                ".jpeg",
                ".png",
                ".gif",
                ".svg",
                ".css",
                ".js",
                "doubleclick",
                "banner",
                "ads",
                "analytics",
                "tracker"
            ]

            ul = u.lower()

            for b in bad:
                if b in ul:
                    return False

            for g in good:
                if g in ul:
                    return True

            return False

        with sync_playwright() as p:

            browser = p.chromium.launch(
                headless=True
            )

            context = browser.new_context(
                user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/124 Safari/537.36"
            )

            page = context.new_page()

            def handle_response(r):

                try:

                    u = r.url

                    ct = r.headers.get("content-type", "")

                    if valid(u) or "video" in ct or "mpegurl" in ct:

                        media.append({
                            "url": u,
                            "type": ct
                        })

                except:
                    pass

            page.on("response", handle_response)

            page.goto(
                url,
                timeout=120000,
                wait_until="domcontentloaded"
            )

            try:
                page.mouse.click(640, 360)
            except:
                pass

            try:
                page.locator("video").click(timeout=10000)
            except:
                pass

            page.wait_for_timeout(60000)

            browser.close()

        uniq = []
        seen = set()

        for m in media:

            if m["url"] not in seen:

                seen.add(m["url"])

                uniq.append(m)

        print(json.dumps(uniq))

        PY

    ############################################
    # DOWNLOAD VIDEOS
    ############################################

    - name: Download videos
      run: |

        mkdir -p downloads

        while IFS= read -r URL
        do

          (

          echo "================================="
          echo "START $URL"
          echo "================================="

          TS=$(date +"%Y-%m-%d_%H-%M-%S")_$RANDOM

          DIR="downloads/$TS"

          mkdir -p "$DIR"

          ####################################
          # STEP 1 DIRECT DOWNLOAD
          ####################################

          echo "DIRECT yt-dlp"

          yt-dlp \
            --no-playlist \
            --user-agent "Mozilla/5.0" \
            --referer "$URL" \
            --add-header "Referer:$URL" \
            --add-header "User-Agent:Mozilla/5.0" \
            --retries 20 \
            --fragment-retries 20 \
            --retry-sleep 5 \
            --concurrent-fragments 4 \
            --hls-use-mpegts \
            --downloader ffmpeg \
            --merge-output-format mp4 \
            -f "bestvideo+bestaudio/best" \
            -o "$DIR/%(title).120s_%(id)s.%(ext)s" \
            "$URL" || true

          FILE=$(find "$DIR" -type f -iname "*.mp4" | sort | tail -n1 || true)

          SIZE=0

          if [ ! -z "$FILE" ]; then
            SIZE=$(stat -c%s "$FILE")
          fi

          ####################################
          # HARD MODE
          ####################################

          if [ -z "$FILE" ] || [ "$SIZE" -lt 5000000 ]; then

            echo "ENTER HARD MODE"

            rm -f "$DIR"/* || true

            ####################################
            # INTERCEPT MEDIA
            ####################################

            python3 intercept.py "$URL" > "$DIR/media.json"

            echo "MEDIA:"
            cat "$DIR/media.json"

            ####################################
            # EXTRACT URLS
            ####################################

            cat "$DIR/media.json" \
            | jq -r '.[].url' \
            | grep -viE 'doubleclick|ads|banner|preview|sprite|thumb|analytics' \
            | sort -u \
            > "$DIR/all.txt"

            ####################################
            # M3U8 FIRST
            ####################################

            grep -i '\.m3u8' "$DIR/all.txt" \
            | grep -viE '144|240|360|low|preview' \
            > "$DIR/m3u8.txt" || true

            SUCCESS=0

            while read M
            do

              if [ -z "$M" ]; then
                continue
              fi

              echo "TRY HLS:"
              echo "$M"

              yt-dlp \
                --referer "$URL" \
                --add-header "Referer:$URL" \
                --add-header "User-Agent:Mozilla/5.0" \
                --retries 20 \
                --fragment-retries 20 \
                --retry-sleep 5 \
                --concurrent-fragments 4 \
                --hls-use-mpegts \
                --downloader ffmpeg \
                --merge-output-format mp4 \
                -f best \
                -o "$DIR/stream.%(ext)s" \
                "$M" && SUCCESS=1 && break

            done < "$DIR/m3u8.txt"

            ####################################
            # MP4 FALLBACK
            ####################################

            if [ "$SUCCESS" -eq 0 ]; then

              grep -i '\.mp4' "$DIR/all.txt" \
              | grep -viE 'preview|sample|thumb' \
              > "$DIR/mp4.txt" || true

              while read M
              do

                if [ -z "$M" ]; then
                  continue
                fi

                echo "TRY MP4:"
                echo "$M"

                wget \
                  --tries=20 \
                  --retry-connrefused \
                  --waitretry=5 \
                  --referer="$URL" \
                  --user-agent="Mozilla/5.0" \
                  -O "$DIR/video.mp4" \
                  "$M" && SUCCESS=1 && break

              done < "$DIR/mp4.txt"

            fi

          fi

          ####################################
          # VALIDATE OUTPUT
          ####################################

          FILE=$(find "$DIR" -type f -iname "*.mp4" | sort | tail -n1 || true)

          if [ ! -z "$FILE" ]; then

            SIZE=$(stat -c%s "$FILE")

            echo "FINAL SIZE: $SIZE"

            if [ "$SIZE" -lt 5000000 ]; then

              echo "DELETE SMALL FILE"

              rm -f "$FILE"

            fi

          fi

          ####################################
          # SPLIT LARGE FILES
          ####################################

          FILE=$(find "$DIR" -type f -iname "*.mp4" | sort | tail -n1 || true)

          if [ ! -z "$FILE" ]; then

            SIZE=$(stat -c%s "$FILE")

            if [ "$SIZE" -gt 95000000 ]; then

              echo "SPLIT LARGE FILE"

              7z a -v90m "$DIR/video.7z" "$FILE"

              rm -f "$FILE"

            fi

          fi

          echo "DONE $URL"

          ) &

        done < urls.txt

        wait

    ############################################
    # COMMIT DOWNLOADS
    ############################################

    - name: Commit downloads
      run: |

        git config user.name github-actions
        git config user.email github-actions@github.com

        git add downloads

        git commit -m "videos downloaded" || echo "nothing to commit"

        git push
