name: Video Downloader Workflow
on:
	 workflow_dispatch:
		 inputs:
		 urls:
			 description: 'Video URLs (one per line)'
			 required: true
			 type: string
		 quality:
			 description: 'Preferred quality (e.g., 720p, best)'			 required: false
			 default: 'best'
			 type: string
		 mode:
			 description: 'Download mode'
			 required: false
			 default: 'normal'
			 type: choice
			 options:
				 - normal
				 - hard
		 cookie_domain:
			 description: 'Domain for cookie extraction'
			 required: false
			 type: string
 

jobs:
	 download:
		 runs-on: ubuntu-latest
 steps:
 - name: Checkout repository
 uses: actions/checkout@v4
 - name: Setup Python
 uses: actions/setup-python@v5 with:
	 python-version: '3.10'
 - name: Install system dependencies run: |
	 sudo apt-get update
	 sudo apt-get install -y \
		 ffmpeg \
		 mediainfo \
		 zip \
		 unzip \
		 curl \
		 wget
 - name: Install Python requirements run: |
	 pip install --upgrade pip
	 pip install \
		 yt-dlp \
		 requests \
		 beautifulsoup4 \
		 lxml \
		 m3u8
 - name: Create interceptor.py
 run: |
	 cat > interceptor.py << 'EOF'
 

 #!/usr/bin/env python3
 """
 HTTP request interceptor for m3u8 filtering
 """
 from http.server import HTTPServer, BaseHTTPRequestHandler import urllib.parse
 import re
 class InterceptorHandler(BaseHTTPRequestHandler):	 def do_GET(self):
		 parsed = urllib.parse.urlparse(self.path)		 query = urllib.parse.parse_qs(parsed.query)
 if 'url' in query:
 target_url = query['url'][0]
 if target_url.endswith('.m3u8'):	 import m3u8
	 import requests
 try:
 resp = requests.get(target_url, timeout=10) if resp.status_code == 200:
	 playlist = m3u8.loads(resp.text)
 # Filter segments
 filtered_segments = []
 for seg in playlist.segments:
	 if not any(x in seg.uri for x in ['		 filtered_segments.append(seg)
 playlist.segments = filtered_segments
 self.send_response(200)
 self.send_header('Content-Type', 'appli self.end_headers()
 self.wfile.write(playlist.dumps().encod return
 

 except Exception as e:
 print(f"Error processing m3u8: {e}")
 self.send_response(404)
 self.end_headers()
 if __name__ == '__main__':
	 server = HTTPServer(('localhost', 8765), InterceptorHandler	 print("Interceptor running on port 8765")
	 server.serve_forever()
 EOF
 - name: Save URLs to file
 run: |
	 echo "${{ inputs.urls }}" > urls.txt	 echo "URLs saved:"
	 cat urls.txt
 - name: Extract cookies (if domain provided)
 if: ${{ inputs.cookie_domain != '' }}
 run: |
	 echo "Extracting cookies for domain: ${{ inputs.cookie_domain }	 # Cookie extraction logic would be implemented here
	 echo "cookies_extracted=1" >> $GITHUB_ENV
 - name: Start interceptor in background run: |
	 python3 interceptor.py &
	 echo $! > interceptor.pid
	 sleep 2
 - name: Main download logic
 run: |
	 # Read URLs from file
	 mapfile -t URL_ARRAY < urls.txt
 for url in "${URL_ARRAY[@]}"; do
 

 echo "Processing: $url"
 # Hard mode logic
 if [[ "${{ inputs.mode }}" == "hard" ]]; then
	 echo "Hard mode enabled - using advanced extraction"	 python3 -c "
	 import yt_dlp
	 import json
 ydl_opts = {
	 'quiet': True,
	 'no_warnings': True,
	 'force_generic_extractor': True,
	 'extractor_args': {'generic': ['--no-check-certificate' }
	 with yt_dlp.YoutubeDL(ydl_opts) as ydl:
		 try:
			 info = ydl.extract_info('$url', download=False)			 print(json.dumps(info, indent=2))
		 except Exception as e:
			 print(f'Hard mode extraction failed: {e}')	 "
 fi
 # M3U8 detection and filtering
 if [[ "$url" == *".m3u8"* ]]; then
	 echo "M3U8 stream detected - applying filtering"	 FILTERED_URL="http://localhost:8765?url=${url}" else
	 FILTERED_URL="$url"
 fi
 # Quality generation logic
 QUALITY="${{ inputs.quality }}"
 if [[ "$QUALITY" == "auto" ]]; then
	 QUALITY_ARGS=""
 

 elif [[ "$QUALITY" == "best" ]]; then
	 QUALITY_ARGS="-f best"
 elif [[ "$QUALITY" == "worst" ]]; then
	 QUALITY_ARGS="-f worst"
 else
	 # Parse resolution like 720p
	 HEIGHT="${QUALITY%p}"
	 QUALITY_ARGS="-f \"best[height<=$HEIGHT]\"" fi
 # yt-dlp download with fallback
 echo "Downloading with yt-dlp..."
 YTDLP_CMD="yt-dlp \
	 --no-check-certificate \
	 --user-agent 'Mozilla/5.0' \
	 --retries 10 \
	 --fragment-retries 10 \
	 --buffer-size 16K \
	 --http-chunk-size 10M \
	 --concurrent-fragments 5 \
	 --no-part \
	 --restrict-filenames \
	 --output '%(title)s.%(ext)s' \
	 $QUALITY_ARGS \
	 '$FILTERED_URL'"
 if ! eval "$YTDLP_CMD"; then
	 echo "yt-dlp failed, attempting direct MP4 fallback..."
 # Direct MP4 fallback logic
 if [[ "$url" == *".mp4"* ]]; then
	 wget --user-agent="Mozilla/5.0" \
		 --no-check-certificate \
		 --tries=3 \
		 --output-document="direct_fallback.mp4" \		 "$url"
 else
 

			 echo "No direct MP4 fallback available"		 fi
	 fi
 done
 - name: Generate MediaInfo reports
 run: |
	 for file in *.{mp4,mkv,webm,avi}; do
		 if [ -f "$file" ]; then
			 echo "=== MediaInfo for $file ===" >> mediainfo.txt			 mediainfo "$file" >> mediainfo.txt
			 echo -e "\n\n" >> mediainfo.txt
		 fi
	 done
 - name: Stop interceptor
 run: |
	 if [ -f interceptor.pid ]; then
		 kill $(cat interceptor.pid) 2>/dev/null || true		 rm -f interceptor.pid
	 fi
 - name: Cleanup temporary files
 run: |
	 rm -f interceptor.py
	 rm -f urls.txt
	 # Remove partial downloads
	 find . -name "*.part" -delete
	 find . -name "*.ytdl" -delete
 - name: Create zip archive
 run: |
	 TIMESTAMP=$(date +%Y%m%d_%H%M%S)
	 mkdir -p downloads
	 mv *.{mp4,mkv,webm,avi,json,info.txt} downloads/ 2>/dev/null ||	 mv mediainfo.txt downloads/ 2>/dev/null || true
 

 if [ -d "downloads" ] && [ "$(ls -A downloads 2>/dev/null)" ]; 	 zip -r "video_downloads_${TIMESTAMP}.zip" downloads/
 else
	 echo "No files to archive" > empty.txt
	 zip "video_downloads_${TIMESTAMP}.zip" empty.txt
 fi
 - name: Upload artifacts
 uses: actions/upload-artifact@v4
 with:
	 name: video-downloads
	 path: |
		 video_downloads_*.zip
		 downloads/
	 retention-days: 7
 - name: Final cleanup
 run: |
	 rm -rf downloads/
	 rm -f video_downloads_*.zip
	 echo "done < urls.txt"
	 echo "wait"
	 echo "All processes completed successfully"
