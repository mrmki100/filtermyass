name: Video Downloader Workflow

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "Video URLs (one per line)"
        required: true
        type: string

      quality:
        description: "Preferred quality"
        required: false
        default: "best"
        type: string

      mode:
        description: "Download mode"
        required: false
        default: "normal"
        type: choice
        options:
          - normal
          - hard

      cookie_domain:
        description: "Domain for cookie extraction"
        required: false
        type: string

jobs:
  download:
    runs-on: ubuntu-latest

    steps:

      #######################################################
      # CHECKOUT
      #######################################################

      - name: Checkout repository
        uses: actions/checkout@v4

      #######################################################
      # PYTHON
      #######################################################

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      #######################################################
      # SYSTEM DEPENDENCIES
      #######################################################

      - name: Install system dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            ffmpeg \
            mediainfo \
            zip \
            unzip \
            curl \
            wget \
            jq

      #######################################################
      # PYTHON REQUIREMENTS
      #######################################################

      - name: Install Python requirements
        run: |
          pip install --upgrade pip

          pip install \
            yt-dlp \
            requests \
            beautifulsoup4 \
            lxml \
            m3u8 \
            playwright

          playwright install --with-deps chromium

      #######################################################
      # CREATE INTERCEPTOR
      #######################################################

      - name: Create interceptor.py
        run: |
          cat > interceptor.py << 'EOF'
          #!/usr/bin/env python3

          from http.server import HTTPServer, BaseHTTPRequestHandler
          import urllib.parse
          import requests
          import m3u8

          class InterceptorHandler(BaseHTTPRequestHandler):

              def do_GET(self):

                  parsed = urllib.parse.urlparse(self.path)
                  query = urllib.parse.parse_qs(parsed.query)

                  if 'url' not in query:
                      self.send_response(400)
                      self.end_headers()
                      return

                  target_url = query['url'][0]

                  try:

                      resp = requests.get(
                          target_url,
                          timeout=15
                      )

                      if resp.status_code != 200:
                          self.send_response(404)
                          self.end_headers()
                          return

                      if target_url.endswith(".m3u8"):

                          playlist = m3u8.loads(resp.text)

                          filtered_segments = []

                          for seg in playlist.segments:

                              if not any(
                                  x in seg.uri.lower()
                                  for x in [
                                      "ads",
                                      "promo",
                                      "banner",
                                      "doubleclick"
                                  ]
                              ):
                                  filtered_segments.append(seg)

                          playlist.segments = filtered_segments

                          self.send_response(200)

                          self.send_header(
                              "Content-Type",
                              "application/vnd.apple.mpegurl"
                          )

                          self.end_headers()

                          self.wfile.write(
                              playlist.dumps().encode()
                          )

                          return

                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(resp.content)

                  except Exception as e:
                      print(e)

                      self.send_response(500)
                      self.end_headers()

          if __name__ == "__main__":

              server = HTTPServer(
                  ("0.0.0.0", 8765),
                  InterceptorHandler
              )

              print("Interceptor running on port 8765")

              server.serve_forever()
          EOF

      #######################################################
      # SAVE URLS
      #######################################################

      - name: Save URLs
        run: |
          echo "${{ inputs.urls }}" > urls.txt

          echo "Saved URLs:"
          cat urls.txt

      #######################################################
      # START INTERCEPTOR
      #######################################################

      - name: Start interceptor
        run: |
          python3 interceptor.py &

          echo $! > interceptor.pid

          sleep 3

      #######################################################
      # MAIN DOWNLOAD
      #######################################################

      - name: Download videos
        run: |

          mkdir -p downloads

          mapfile -t URL_ARRAY < urls.txt

          for url in "${URL_ARRAY[@]}"
          do

            echo "================================="
            echo "PROCESSING:"
            echo "$url"
            echo "================================="

            QUALITY="${{ inputs.quality }}"

            if [[ "$QUALITY" == "best" ]]; then

              FORMAT="bestvideo+bestaudio/best"

            elif [[ "$QUALITY" == "worst" ]]; then

              FORMAT="worst"

            else

              HEIGHT="${QUALITY%p}"

              FORMAT="best[height<=${HEIGHT}]"

            fi

            FILTERED_URL="$url"

            if [[ "$url" == *".m3u8"* ]]; then

              FILTERED_URL="http://localhost:8765?url=$url"

            fi

            yt-dlp \
              --user-agent "Mozilla/5.0" \
              --no-check-certificate \
              --retries 20 \
              --fragment-retries 20 \
              --concurrent-fragments 5 \
              --no-part \
              --merge-output-format mp4 \
              -f "$FORMAT" \
              -o "downloads/%(title)s.%(ext)s" \
              "$FILTERED_URL" || true

          done

      #######################################################
      # MEDIAINFO
      #######################################################

      - name: Generate MediaInfo
        run: |

          for file in downloads/*.{mp4,mkv,webm,avi}
          do

            if [ -f "$file" ]; then

              echo "================================="
              echo "$file"
              echo "================================="

              mediainfo "$file"

            fi

          done

      #######################################################
      # ZIP
      #######################################################

      - name: Create zip archive
        run: |

          TIMESTAMP=$(date +%Y%m%d_%H%M%S)

          zip -r \
            "video_downloads_${TIMESTAMP}.zip" \
            downloads/

      #######################################################
      # UPLOAD
      #######################################################

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: video-downloads
          path: video_downloads_*.zip
          retention-days: 7

      #######################################################
      # CLEANUP
      #######################################################

      - name: Cleanup
        run: |

          if [ -f interceptor.pid ]; then
            kill $(cat interceptor.pid) || true
          fi

          rm -f interceptor.pid
          rm -f interceptor.py
          rm -f urls.txt

          echo "All processes completed successfully"
