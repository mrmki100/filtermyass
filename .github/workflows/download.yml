name: Video Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Video page URL"
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install yt-dlp (only dependency)
      run: |
        python3 -m pip install --upgrade pip
        pip install yt-dlp

    - name: Create download folder
      run: |
        ts=$(date +"%Y-%m-%d_%H-%M-%S")
        mkdir -p "downloads/$ts"
        echo "DL_DIR=downloads/$ts" >> $GITHUB_ENV

    - name: Download video with yt-dlp
      run: |
        yt-dlp \
          -o "$DL_DIR/video.%(ext)s" \
          "${{ github.event.inputs.url }}"

    - name: Check if file downloaded
      id: checkfile
      run: |
        file=$(ls "$DL_DIR" | head -n 1 || true)
        echo "FILE=$file" >> $GITHUB_ENV
        if [ -z "$file" ]; then
          echo "No file downloaded. Stopping."
          exit 1
        fi

    - name: Split if over 100MB
      run: |
        cd "$DL_DIR"
        FILESIZE=$(stat -c%s "$FILE")

        echo "File size = $FILESIZE bytes"

        if [ $FILESIZE -gt 100000000 ]; then
          echo "Splitting file..."
          7z a -v90m "archive.7z" "$FILE"
          rm "$FILE"
        else
          echo "Under 100MB → no split."
        fi

    - name: Commit and push
      run: |
        git config user.name "github-actions"
        git config.user.email "git-actions@github.com"
        git add downloads
        git commit -m "Add downloaded video"
        git push
