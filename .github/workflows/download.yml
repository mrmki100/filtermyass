name: downloader

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest

    steps:

      ########################################################
      # CHECKOUT
      ########################################################

      - name: Checkout
        uses: actions/checkout@v4

      ########################################################
      # REQUIREMENTS
      ########################################################

      - name: Install requirements
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            ffmpeg \
            mediainfo \
            jq \
            p7zip-full

          pip install yt-dlp playwright

          playwright install chromium

      ########################################################
      # CREATE INTERCEPTOR
      ########################################################

      - name: Create interceptor
        run: |
          cat > interceptor.py << 'PY'
          import asyncio
          import json
          from playwright.async_api import async_playwright

          async def main(url):

              media = set()

              async with async_playwright() as p:

                  browser = await p.chromium.launch(headless=True)

                  context = await browser.new_context()

                  page = await context.new_page()

                  def handle_response(resp):
                      try:
                          u = resp.url

                          if any(x in u.lower() for x in [
                              ".m3u8",
                              ".mp4",
                              "/media/",
                              "/hls/"
                          ]):
                              media.add(u)

                      except:
                          pass

                  page.on("response", handle_response)

                  try:
                      await page.goto(
                          url,
                          wait_until="networkidle",
                          timeout=120000
                      )
                  except:
                      pass

                  try:
                      await page.mouse.move(500, 400)
                      await page.mouse.click(500, 400)
                  except:
                      pass

                  await page.wait_for_timeout(15000)

                  cookies = await context.cookies()

                  await browser.close()

                  print(json.dumps({
                      "media": [{"url": x} for x in sorted(media)],
                      "cookies": cookies
                  }))

          import sys

          asyncio.run(main(sys.argv[1]))
          PY

      ########################################################
      # DOWNLOAD
      ########################################################

      - name: Download videos
        run: |

          mkdir -p downloads

          while IFS= read -r URL
          do

            echo "======================================"
            echo "PROCESSING: $URL"
            echo "======================================"

            TS=$(date +"%Y-%m-%d_%H-%M-%S")_$RANDOM

            DIR="downloads/$TS"

            mkdir -p "$DIR"

            ##################################################
            # NORMAL MODE
            ##################################################

            yt-dlp \
              --no-playlist \
              --extractor-retries 20 \
              --fragment-retries 50 \
              --retries 50 \
              --user-agent "Mozilla/5.0" \
              --merge-output-format mp4 \
              -f "bestvideo+bestaudio/best" \
              -o "$DIR/%(title)s.%(ext)s" \
              "$URL" || true

            FILE=$(find "$DIR" -iname "*.mp4" | head -n1 || true)

            VALID=0

            if [ ! -z "$FILE" ]; then

              SIZE=$(stat -c%s "$FILE")

              echo "FOUND SIZE=$SIZE"

              if [ "$SIZE" -gt 5000000 ]; then
                VALID=1
              fi

            fi

            ##################################################
            # HARD MODE
            ##################################################

            if [ $VALID -eq 0 ]; then

              echo "ENTERING HARD MODE"

              rm -f "$DIR"/*.mp4 || true

              python3 interceptor.py "$URL" > "$DIR/data.json"

              ################################################
              # COOKIES
              ################################################

              echo '# Netscape HTTP Cookie File' > "$DIR/cookies.txt"

              cat "$DIR/data.json" | jq -r '
                .cookies[] |
                [
                  (
                    if (.domain | startswith(".")) then
                      .domain
                    else
                      "." + .domain
                    end
                  ),
                  "TRUE",
                  .path,
                  (
                    if .secure then
                      "TRUE"
                    else
                      "FALSE"
                    end
                  ),
                  (
                    if .expires then
                      (.expires | floor | tostring)
                    else
                      "0"
                    end
                  ),
                  .name,
                  .value
                ] | @tsv
              ' >> "$DIR/cookies.txt"

              ################################################
              # RAW URLS
              ################################################

              cat "$DIR/data.json" \
                | jq -r '.media[].url' \
                | sort -u \
                > "$DIR/raw.txt"

              ################################################
              # REAL M3U8 ONLY
              ################################################

              grep -Ei \
                '/media/.+/.+/.+\.mp4/index-.*\.m3u8' \
                "$DIR/raw.txt" \
                > "$DIR/real_m3u8.txt" || true

              cp "$DIR/real_m3u8.txt" \
                "$DIR/final_streams.txt"

              ################################################
              # BUILD HIGHER QUALITIES
              ################################################

              while IFS= read -r M
              do

                [ -z "$M" ] && continue

                echo "$M" \
                  | sed 's/_360p\.mp4/_720p.mp4/g' \
                  >> "$DIR/final_streams.txt"

                echo "$M" \
                  | sed 's/_360p\.mp4/_1080p.mp4/g' \
                  >> "$DIR/final_streams.txt"

              done < "$DIR/real_m3u8.txt"

              sort -u "$DIR/final_streams.txt" \
                -o "$DIR/final_streams.txt"

              ################################################
              # DOWNLOAD STREAMS
              ################################################

              SUCCESS=0

              while IFS= read -r M
              do

                [ -z "$M" ] && continue

                echo "TESTING: $M"

                curl \
                  -L \
                  --connect-timeout 30 \
                  --max-time 60 \
                  -A "Mozilla/5.0" \
                  "$M" \
                  -o "$DIR/test.m3u8" || continue

                if ! grep -q "#EXTM3U" "$DIR/test.m3u8"; then
                  echo "INVALID M3U8"
                  continue
                fi

                yt-dlp \
                  --cookies "$DIR/cookies.txt" \
                  --add-header "Referer:$URL" \
                  --add-header "Origin:https://hello.porn" \
                  --user-agent "Mozilla/5.0" \
                  --concurrent-fragments 10 \
                  --fragment-retries 100 \
                  --retries 100 \
                  --hls-prefer-native \
                  --no-part \
                  --continue \
                  --merge-output-format mp4 \
                  -o "$DIR/final_%(height)sp.%(ext)s" \
                  "$M" || true

                DOWNLOADED=$(find "$DIR" -iname "final_*" | head -n1 || true)

                if [ ! -z "$DOWNLOADED" ]; then

                  SIZE=$(stat -c%s "$DOWNLOADED")

                  if [ "$SIZE" -gt 5000000 ]; then
                    SUCCESS=1
                    break
                  fi

                fi

              done < "$DIR/final_streams.txt"

            fi

            ##################################################
            # CLEANUP
            ##################################################

            find "$DIR" -type f -size -2M -delete || true

            cd "$DIR"

            7z a result.7z ./*

            cd - >/dev/null

          done < urls.txt

      ########################################################
      # ARTIFACT
      ########################################################

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-videos
          path: downloads/**/result.7z
          if-no-files-found: warn
