name: Video Downloader

on:
  workflow_dispatch:
    inputs:
      url1:
        description: "Video URL 1"
        required: false
      url2:
        description: "Video URL 2"
        required: false
      url3:
        description: "Video URL 3"
        required: false
      url4:
        description: "Video URL 4"
        required: false
      url5:
        description: "Video URL 5"
        required: false

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:

    - uses: actions/checkout@v4

    - name: Install tools
      run: |

        python3 -m pip install --upgrade pip
        pip install yt-dlp playwright

        sudo apt-get update
        sudo apt-get install -y ffmpeg wget jq p7zip-full curl

        playwright install chromium

    - name: Prepare URLs
      run: |

        cat > urls.txt <<EOF
        ${{ github.event.inputs.url1 }}
        ${{ github.event.inputs.url2 }}
        ${{ github.event.inputs.url3 }}
        ${{ github.event.inputs.url4 }}
        ${{ github.event.inputs.url5 }}
        EOF

        sed -i '/^$/d' urls.txt

    - name: Create network interceptor
      run: |

        cat > intercept.py << 'PY'
        import sys
        import json
        from playwright.sync_api import sync_playwright

        url=sys.argv[1]
        media=[]

        def valid(u):
            good=[".mp4",".m3u8",".mpd","videoplayback","manifest"]
            bad=[".jpg",".png",".gif",".css",".js",".svg"]

            for b in bad:
                if b in u.lower():
                    return False

            for g in good:
                if g in u.lower():
                    return True

            return False

        with sync_playwright() as p:

            browser=p.chromium.launch(headless=True)
            page=browser.new_page()

            def resp(r):
                try:
                    u=r.url
                    ct=r.headers.get("content-type","")

                    if valid(u) or "video" in ct or "mpegurl" in ct:
                        media.append({
                            "url":u,
                            "type":ct
                        })
                except:
                    pass

            page.on("response",resp)

            page.goto(url,timeout=90000,wait_until="networkidle")

            try:
                page.locator("video").click(timeout=5000)
            except:
                pass

            page.wait_for_timeout(15000)

            browser.close()

        uniq=[]
        seen=set()

        for m in media:
            if m["url"] not in seen:
                seen.add(m["url"])
                uniq.append(m)

        print(json.dumps(uniq))
        PY

    - name: Download videos
      run: |

        mkdir -p downloads

        while IFS= read -r URL
        do

          (
          echo "PROCESSING $URL"

          TS=$(date +"%Y-%m-%d_%H-%M-%S")_$RANDOM
          DIR="downloads/$TS"
          mkdir -p "$DIR"

          ################################
          # STEP 1 yt-dlp
          ################################

          echo "STEP1 yt-dlp"

          yt-dlp \
            --no-playlist \
            -f "bestvideo+bestaudio/best" \
            --merge-output-format mp4 \
            --retries 10 \
            --fragment-retries 10 \
            --concurrent-fragments 4 \
            -o "$DIR/%(title).120s_%(id)s.%(ext)s" \
            "$URL" || true

          FILE=$(find "$DIR" -type f -iname "*.mp4" | head -n1 || true)

          SIZE=0

          if [ ! -z "$FILE" ]; then
            SIZE=$(stat -c%s "$FILE")
          fi

          ################################
          # HARD MODE
          ################################

          if [ -z "$FILE" ] || [ $SIZE -lt 1000000 ]; then

            echo "START HARD MODE"

            rm -f "$DIR"/* || true

            python3 intercept.py "$URL" > "$DIR/media.json"

            echo "MEDIA FOUND"
            cat "$DIR/media.json"

            ################################
            # FILTER MEDIA
            ################################

            cat "$DIR/media.json" \
            | jq -r '.[].url' \
            | grep -vE 'adtng|doubleclick|jerkmate|amateur\.tv|creative|banner|ads' \
            > "$DIR/all.txt"

            ################################
            # TRY M3U8 FIRST
            ################################

            grep '\.m3u8' "$DIR/all.txt" > "$DIR/m3u8.txt" || true

            SUCCESS=0

            while read M
            do

              if [ -z "$M" ]; then
                continue
              fi

              echo "TRY HLS $M"

              yt-dlp \
                --referer "$URL" \
                -f best \
                --merge-output-format mp4 \
                -o "$DIR/stream.%(ext)s" \
                "$M" && SUCCESS=1 && break

            done < "$DIR/m3u8.txt"

            ################################
            # TRY MP4
            ################################

            if [ $SUCCESS -eq 0 ]; then

              grep '\.mp4' "$DIR/all.txt" > "$DIR/mp4.txt" || true

              while read M
              do

                if [ -z "$M" ]; then
                  continue
                fi

                echo "TRY MP4 $M"

                wget \
                  --referer="$URL" \
                  --user-agent="Mozilla/5.0" \
                  -O "$DIR/video.mp4" \
                  "$M" && SUCCESS=1 && break

              done < "$DIR/mp4.txt"

            fi

          fi

          ################################
          # VALIDATE FILE
          ################################

          FILE=$(find "$DIR" -type f -iname "*.mp4" | head -n1 || true)

          if [ ! -z "$FILE" ]; then

            SIZE=$(stat -c%s "$FILE")

            echo "SIZE $SIZE"

            if [ $SIZE -lt 1000000 ]; then
              echo "FAIL tiny"
              rm -f "$FILE"
            fi
          fi

          ################################
          # SPLIT BIG FILE
          ################################

          FILE=$(find "$DIR" -type f -iname "*.mp4" | head -n1 || true)

          if [ ! -z "$FILE" ]; then

            SIZE=$(stat -c%s "$FILE")

            if [ $SIZE -gt 95000000 ]; then

              echo "SPLIT"

              7z a -v90m "$DIR/video.7z" "$FILE"

              rm "$FILE"

            fi
          fi

          ) &

        done < urls.txt

        wait

    - name: Commit
      run: |

        git config user.name github-actions
        git config user.email github-actions@github.com

        git add downloads

        git commit -m "videos downloaded" || echo nothing

        git push
