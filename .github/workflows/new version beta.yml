name: Universal Video Downloader V13

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Video/Page URL"
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            ffmpeg \
            aria2 \
            jq \
            curl \
            wget \
            python3 \
            python3-pip

          pip install -U yt-dlp requests

      - name: Prepare folders
        run: |
          mkdir -p downloads
          mkdir -p temp

      - name: Create extractor
        run: |
          cat > extractor.py << 'PY'
          import re
          import json
          import requests
          import sys

          url = sys.argv[1]

          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/137.0 Safari/537.36",
              "Accept-Language": "en-US,en;q=0.9",
              "Referer": url,
          }

          try:
              r = requests.get(
                  url,
                  headers=headers,
                  timeout=30
              )

              html = r.text

              patterns = [
                  r'https://[^"\']+\.m3u8[^"\']*',
                  r'https://[^"\']+\.mp4[^"\']*',
              ]

              bad = [
                  "ads",
                  "doubleclick",
                  "tracker",
                  "traffic",
                  "stats",
                  "banner",
                  "promo",
                  "sprite",
                  ".jpg",
                  ".png",
                  ".webp",
                  ".gif"
              ]

              found = set()

              for p in patterns:
                  matches = re.findall(p, html)

                  for m in matches:

                      if any(x in m.lower() for x in bad):
                          continue

                      found.add(m)

              print(json.dumps(list(found)))

          except Exception:
              print("[]")
          PY

      - name: Download video
        env:
          URL: ${{ github.event.inputs.url }}
        run: |
          set +e

          mkdir -p downloads

          echo "===================================="
          echo "Target URL:"
          echo "$URL"
          echo "===================================="

          cd downloads

          echo "===================================="
          echo "Trying yt-dlp direct extraction..."
          echo "===================================="

          yt-dlp \
            --ignore-errors \
            --no-playlist \
            --retries 25 \
            --fragment-retries 25 \
            --concurrent-fragments 8 \
            --socket-timeout 30 \
            --extractor-retries 10 \
            --retry-sleep 5 \
            --downloader ffmpeg \
            --hls-use-mpegts \
            --merge-output-format mp4 \
            --remux-video mp4 \
            --geo-bypass \
            --no-check-certificates \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/137.0 Safari/537.36" \
            --referer "https://www.pornhub.com/" \
            --add-header "Accept-Language:en-US,en;q=0.9" \
            --add-header "Origin:https://www.pornhub.com" \
            --add-header "Sec-Fetch-Dest:empty" \
            --add-header "Sec-Fetch-Mode:cors" \
            --add-header "Sec-Fetch-Site:same-site" \
            --add-header "Connection:keep-alive" \
            --add-header "DNT:1" \
            --downloader-args "ffmpeg:-headers Referer:https://www.pornhub.com/" \
            -f "bestvideo+bestaudio/best" \
            -o "video.%(ext)s" \
            "$URL"

          echo "===================================="
          echo "Checking downloaded files..."
          echo "===================================="

          ls -lah || true

          VALID=0

          for f in *; do

            if [ -f "$f" ]; then

              SIZE=$(stat -c%s "$f")

              echo "$f size: $SIZE"
                            if [ "$SIZE" -gt 1000000 ]; then
                VALID=1
              else
                echo "Removing small file: $f"
                rm -f "$f"
              fi

            fi

          done

          if [ "$VALID" -eq 0 ]; then

            echo "===================================="
            echo "yt-dlp did not produce a valid file"
            echo "Trying fallback extractor..."
            echo "===================================="

            cd ..

            python extractor.py "$URL" > links.json

            cat links.json

            COUNT=$(jq length links.json)

            if [ "$COUNT" -gt 0 ]; then

              echo "Found $COUNT candidate streams"

              for STREAM in $(jq -r '.[]' links.json); do

                echo "Trying stream:"
                echo "$STREAM"

                yt-dlp \
                  --ignore-errors \
                  --retries 20 \
                  --fragment-retries 20 \
                  --concurrent-fragments 8 \
                  --downloader ffmpeg \
                  --hls-use-mpegts \
                  --merge-output-format mp4 \
                  --remux-video mp4 \
                  --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
                  --referer "$URL" \
                  -o "downloads/fallback_%(id)s.%(ext)s" \
                  "$STREAM"

              done

            else
              echo "No streams found by extractor."
            fi

          fi

      - name: Commit downloaded videos
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add downloads/* || true

          git commit -m "Add downloaded video" || echo "Nothing to commit"

          git push
