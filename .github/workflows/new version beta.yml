name: Video Downloader V5 Ultra Fixed beta

on:
  workflow_dispatch:
    inputs:
      url1:
        description: "Video URL 1"
        required: false
      url2:
        description: "Video URL 2"
        required: false
      url3:
        description: "Video URL 3"
        required: false
      url4:
        description: "Video URL 4"
        required: false
      url5:
        description: "Video URL 5"
        required: false

permissions:
  contents: write

concurrency:
  group: downloader
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:

  download:

    runs-on: ubuntu-latest

    container:
      image: mcr.microsoft.com/playwright/python:v1.59.0-noble

    timeout-minutes: 360

    steps:

    ########################################
    # CHECKOUT
    ########################################

    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        persist-credentials: true

    ########################################
    # FIX CACHE
    ########################################

    - name: Fix cache permissions
      run: |
        mkdir -p /github/home/.cache/pip
        chmod -R 777 /github/home/.cache || true

    ########################################
    # CACHE PIP
    ########################################

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: /github/home/.cache/pip
        key: pip-${{ runner.os }}

    ########################################
    # CACHE PLAYWRIGHT
    ########################################

    - name: Cache Playwright
      uses: actions/cache@v4
      with:
        path: /ms-playwright
        key: playwright-${{ runner.os }}

    ########################################
    # INSTALL TOOLS
    ########################################

    - name: Install tools
      run: |

        set -e

        apt-get update

        apt-get install -y \
          ffmpeg \
          wget \
          curl \
          jq \
          aria2 \
          p7zip-full

        python3 -m pip install --upgrade pip

        pip install -U yt-dlp playwright

    ########################################
    # PREPARE URLS
    ########################################

    - name: Prepare URLs
      run: |

        cat > urls.txt <<EOF
        ${{ github.event.inputs.url1 }}
        ${{ github.event.inputs.url2 }}
        ${{ github.event.inputs.url3 }}
        ${{ github.event.inputs.url4 }}
        ${{ github.event.inputs.url5 }}
        EOF

        cat urls.txt \
        | sed '/^$/d' \
        | sort -u \
        > cleaned.txt

        mv cleaned.txt urls.txt

        echo "========== URLS =========="
        cat urls.txt || true

    ########################################
    # CREATE INTERCEPTOR
    ########################################

    - name: Create interceptor
      run: |

        cat > intercept.py << 'PY'

        import sys
        import json

        from playwright.sync_api import sync_playwright

        url = sys.argv[1]

        media = []

        def valid(u):

            ul = u.lower()

            good = [
                ".mp4",
                ".m3u8",
                ".mpd",
                "videoplayback",
                "manifest",
                "playlist"
            ]

            bad = [
                ".jpg",
                ".jpeg",
                ".png",
                ".gif",
                ".svg",
                ".css",
                ".js",
                "banner",
                "ads",
                "analytics",
                "doubleclick"
            ]

            for b in bad:
                if b in ul:
                    return False

            for g in good:
                if g in ul:
                    return True

            return False

        with sync_playwright() as p:

            browser = p.chromium.launch(
                headless=True
            )

            context = browser.new_context(
                user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/124 Safari/537.36"
            )

            page = context.new_page()

            def handle_response(r):

                try:

                    u = r.url

                    ct = r.headers.get("content-type", "")

                    if valid(u) or "video" in ct or "mpegurl" in ct:

                        media.append({
                            "url": u,
                            "type": ct
                        })

                except:
                    pass

            page.on("response", handle_response)

            page.goto(
                url,
                timeout=120000,
                wait_until="domcontentloaded"
            )

            try:
                page.mouse.click(640, 360)
            except:
                pass

            try:
                page.locator("video").click(timeout=10000)
            except:
                pass

            page.wait_for_timeout(45000)

            browser.close()

        unique = []

        seen = set()

        for m in media:

            if m["url"] not in seen:

                seen.add(m["url"])

                unique.append(m)

        print(json.dumps(unique))

        PY

    ########################################
    # DOWNLOAD VIDEOS
    ########################################

    - name: Download videos
      run: |

        set -e

        mkdir -p downloads

        while IFS= read -r URL
        do

          (

          echo "======================================"
          echo "PROCESSING: $URL"
          echo "======================================"

          TS=$(date +"%Y-%m-%d_%H-%M-%S")_$RANDOM

          DIR="downloads/$TS"

          mkdir -p "$DIR"

          ####################################
          # STEP 1 NORMAL YT-DLP
          ####################################

          echo "STEP1 NORMAL YT-DLP"

          yt-dlp \
            --no-playlist \
            --ignore-errors \
            --continue \
            --retries 30 \
            --fragment-retries 30 \
            --extractor-retries 30 \
            --file-access-retries 30 \
            --retry-sleep 5 \
            --concurrent-fragments 4 \
            --hls-use-mpegts \
            --merge-output-format mp4 \
            --restrict-filenames \
            --user-agent "Mozilla/5.0" \
            --extractor-args "youtube:player_client=android" \
            -f "bv*+ba/b" \
            -o "$DIR/%(title).120s_%(id)s.%(ext)s" \
            "$URL" || true

          FILE=$(find "$DIR" -type f -iname "*.mp4" | sort | tail -n1 || true)

          SIZE=0

          if [ ! -z "$FILE" ]; then
            SIZE=$(stat -c%s "$FILE")
          fi

          ####################################
          # HARD MODE
          ####################################

          if [ -z "$FILE" ] || [ $SIZE -lt 5000000 ]; then

            echo "START HARD MODE"

            rm -f "$DIR"/* || true

            python3 intercept.py "$URL" > "$DIR/media.json"

            echo "========== MEDIA =========="
            cat "$DIR/media.json" || true

            cat "$DIR/media.json" \
            | jq -r '.[].url' \
            | grep -viE 'ads|banner|doubleclick|analytics|preview|thumb|sprite' \
            | sort -u \
            > "$DIR/all.txt"

            echo "========== FOUND URLS =========="
            cat "$DIR/all.txt" || true

            SUCCESS=0

            ####################################
            # TRY HLS
            ####################################

            grep -i '\.m3u8' "$DIR/all.txt" \
            | grep -viE 'low|preview' \
            > "$DIR/m3u8.txt" || true

            while read M
            do

              if [ -z "$M" ]; then
                continue
              fi

              echo "TRY HLS"
              echo "$M"

              yt-dlp \
                --referer "$URL" \
                --add-header "Referer:$URL" \
                --add-header "User-Agent:Mozilla/5.0" \
                --hls-use-mpegts \
                --retries 20 \
                --fragment-retries 20 \
                -f best \
                --merge-output-format mp4 \
                -o "$DIR/stream.%(ext)s" \
                "$M" \
                && SUCCESS=1 && break

            done < "$DIR/m3u8.txt"

            ####################################
            # TRY MP4 / YOUTUBE DIRECT
            ####################################

            if [ $SUCCESS -eq 0 ]; then

              grep -Ei '\.mp4|videoplayback' "$DIR/all.txt" \
              | grep -viE 'preview|sample|thumb' \
              | sort -u \
              > "$DIR/mp4.txt" || true

              while read M
              do

                if [ -z "$M" ]; then
                  continue
                fi

                echo "TRY DIRECT VIDEO"
                echo "$M"

                ################################
                # TRY YT-DLP DIRECT
                ################################

                yt-dlp \
                  --ignore-errors \
                  --no-check-certificates \
                  --add-header "Referer:$URL" \
                  --add-header "User-Agent:Mozilla/5.0" \
                  -o "$DIR/direct.%(ext)s" \
                  "$M" \
                  && SUCCESS=1 && break

                ################################
                # FALLBACK CURL
                ################################

                curl -L \
                  --retry 20 \
                  --retry-delay 5 \
                  -A "Mozilla/5.0" \
                  -e "$URL" \
                  "$M" \
                  -o "$DIR/video.mp4" \
                  && SUCCESS=1 && break

              done < "$DIR/mp4.txt"

            fi

          fi

          ####################################
          # DEBUG FILES
          ####################################

          echo "====== DOWNLOADED FILES ======"

          find "$DIR" -type f | sort || true

          echo "====== FILE SIZES ======"

          du -h "$DIR" || true

          ####################################
          # DELETE SMALL FILES
          ####################################

          FILE=$(find "$DIR" -type f | sort | tail -n1 || true)

          if [ ! -z "$FILE" ]; then

            SIZE=$(stat -c%s "$FILE")

            echo "FILE SIZE = $SIZE"

            if [ $SIZE -lt 5000000 ]; then

              echo "DELETE SMALL FILE"

              rm -f "$FILE"

            fi

          fi

          ####################################
          # SPLIT LARGE FILES
          ####################################

          FILE=$(find "$DIR" -type f -iname "*.mp4" | sort | tail -n1 || true)

          if [ ! -z "$FILE" ]; then

            SIZE=$(stat -c%s "$FILE")

            if [ $SIZE -gt 95000000 ]; then

              echo "SPLIT LARGE FILE"

              7z a -v90m "$DIR/video.7z" "$FILE"

              rm -f "$FILE"

            fi

          fi

          echo "DONE $URL"

          ) &

        done < urls.txt

        wait

    ########################################
    # DEBUG GIT
    ########################################

    - name: Debug git
      run: |

        pwd

        ls -la

        cd "$GITHUB_WORKSPACE"

        git config --global --add safe.directory "$GITHUB_WORKSPACE"

        git status || true

    ########################################
    # COMMIT
    ########################################

    - name: Commit downloads
      run: |

        set -e

        cd "$GITHUB_WORKSPACE"

        git config --global --add safe.directory "$GITHUB_WORKSPACE"

        git config user.name "github-actions"

        git config user.email "github-actions@github.com"

        if [ ! -d ".git" ]; then
          echo ".git missing"
          exit 1
        fi

        git status

        git add downloads || true

        if git diff --cached --quiet; then

          echo "NO CHANGES"

        else

          git commit -m "videos downloaded"

          git push

        fi
