name: Universal Video Downloader V17 Ultra Stable

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Video URL"
        required: true

      filename:
        description: "Custom filename"
        required: false

      quality:
        description: "Quality (best/2160/1440/1080/720/480)"
        required: false
        default: "best"

permissions:
  contents: write

concurrency:
  group: universal-video-downloader
  cancel-in-progress: false

jobs:

  download:

    runs-on: ubuntu-latest

    timeout-minutes: 360

    env:
      URL: ${{ github.event.inputs.url }}
      CUSTOM_NAME: ${{ github.event.inputs.filename }}
      QUALITY: ${{ github.event.inputs.quality }}

    steps:

    #######################################################################
    # CHECKOUT
    #######################################################################

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
        persist-credentials: true

    #######################################################################
    # PREPARE
    #######################################################################

    - name: Prepare workspace
      run: |

        set -Eeuo pipefail

        mkdir -p downloads
        mkdir -p temp
        mkdir -p logs
        mkdir -p fragments
        mkdir -p ffmpeg_temp
        mkdir -p cookies

        touch downloads/.gitkeep

        echo "Workspace:"
        pwd

        echo "Directory:"
        ls -lah

    #######################################################################
    # CACHE
    #######################################################################

    - name: Cache fragments
      uses: actions/cache@v4
      with:
        path: |
          fragments
          temp
        key: downloader-${{ runner.os }}-${{ github.run_id }}

    #######################################################################
    # INSTALL
    #######################################################################

    - name: Install dependencies
      run: |

        set -Eeuo pipefail

        sudo apt-get update

        sudo apt-get install -y \
          ffmpeg \
          jq \
          curl \
          wget \
          git \
          python3 \
          python3-pip \
          aria2 \
          mediainfo \
          dnsutils \
          unzip \
          tar \
          gzip \
          sed \
          grep \
          coreutils

        python3 -m pip install --upgrade pip

        pip install --upgrade yt-dlp

        echo "Versions"

        yt-dlp --version

        ffmpeg -version | head

        aria2c --version | head

    #######################################################################
    # USER AGENTS
    #######################################################################

    - name: Generate headers
      run: |

        cat > agents.txt <<EOF
        Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/137.0 Safari/537.36
        Mozilla/5.0 (Macintosh; Intel Mac OS X 14_0) AppleWebKit/537.36 Chrome/137.0 Safari/537.36
        Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/137.0 Safari/537.36
        Mozilla/5.0 (iPhone; CPU iPhone OS 18_0 like Mac OS X) AppleWebKit/605.1.15 Version/18.0 Mobile Safari/604.1
        Mozilla/5.0 (Linux; Android 15) AppleWebKit/537.36 Chrome/137.0 Mobile Safari/537.36
        EOF

        UA=$(shuf -n 1 agents.txt)

        DOMAIN=$(echo "$URL" | awk -F/ '{print $3}')

        echo "UA=$UA" >> $GITHUB_ENV
        echo "DOMAIN=$DOMAIN" >> $GITHUB_ENV

        echo "Selected UA:"
        echo "$UA"

    #######################################################################
    # NETWORK
    #######################################################################

    - name: Network diagnostics
      continue-on-error: true
      run: |

        echo "DNS:"
        nslookup "$DOMAIN" || true

        echo "HEAD REQUEST:"

        curl \
          -I \
          -L \
          --max-time 20 \
          --retry 3 \
          -A "$UA" \
          "$URL" || true

    #######################################################################
    # DETECT TYPE
    #######################################################################

    - name: Detect source
      run: |

        echo "Input URL:"
        echo "$URL"

        if echo "$URL" | grep -qi "m3u8"; then
          echo "TYPE=HLS" >> $GITHUB_ENV

        elif echo "$URL" | grep -qi "mpd"; then
          echo "TYPE=DASH" >> $GITHUB_ENV

        else
          echo "TYPE=NORMAL" >> $GITHUB_ENV
        fi

    #######################################################################
    # FORMAT
    #######################################################################

    - name: Build quality selector
      run: |

        FORMAT="bestvideo+bestaudio/best"

        if [ "$QUALITY" = "2160" ]; then
          FORMAT="bestvideo[height<=2160]+bestaudio/best[height<=2160]"
        fi

        if [ "$QUALITY" = "1440" ]; then
          FORMAT="bestvideo[height<=1440]+bestaudio/best[height<=1440]"
        fi

        if [ "$QUALITY" = "1080" ]; then
          FORMAT="bestvideo[height<=1080]+bestaudio/best[height<=1080]"
        fi

        if [ "$QUALITY" = "720" ]; then
          FORMAT="bestvideo[height<=720]+bestaudio/best[height<=720]"
        fi

        if [ "$QUALITY" = "480" ]; then
          FORMAT="bestvideo[height<=480]+bestaudio/best[height<=480]"
        fi

        echo "FORMAT=$FORMAT" >> $GITHUB_ENV

        echo "Selected format:"
        echo "$FORMAT"

    #######################################################################
    # OUTPUT
    #######################################################################

    - name: Build output name
      run: |

        OUTPUT="downloads/video_%(id)s.%(ext)s"

        if [ -n "$CUSTOM_NAME" ]; then
          OUTPUT="downloads/${CUSTOM_NAME}.%(ext)s"
        fi

        echo "OUTPUT=$OUTPUT" >> $GITHUB_ENV

        echo "Output:"
        echo "$OUTPUT"

    #######################################################################
    # COOKIES
    #######################################################################

    - name: Prepare cookies
      run: |

        if [ -s cookies/cookies.txt ]; then
          echo "COOKIE_ARG=--cookies cookies/cookies.txt" >> $GITHUB_ENV
          echo "Using cookies"

        else
          echo "COOKIE_ARG=" >> $GITHUB_ENV
          echo "No valid cookies"
        fi

    #######################################################################
    # PRIMARY DOWNLOAD
    #######################################################################

    - name: yt-dlp main download
      id: primary
      continue-on-error: true
      run: |

        set -Eeuo pipefail

        yt-dlp \
          --verbose \
          --no-playlist \
          --continue \
          --ignore-errors \
          --retries 30 \
          --fragment-retries 30 \
          --extractor-retries 30 \
          --file-access-retries 30 \
          --retry-sleep 5 \
          --socket-timeout 60 \
          --concurrent-fragments 10 \
          --http-chunk-size 10M \
          --merge-output-format mp4 \
          --remux-video mp4 \
          --extractor-args "pornhub:client=web" \
          --user-agent "$UA" \
          --referer "$URL" \
          $COOKIE_ARG \
          --format "$FORMAT" \
          -o "$OUTPUT" \
          "$URL"

    #######################################################################
    # DIRECT FALLBACK
    #######################################################################

    - name: aria2 fallback
      if: steps.primary.outcome != 'success'
      continue-on-error: true
      run: |

        echo "Trying direct download"

        aria2c \
          --max-connection-per-server=16 \
          --split=16 \
          --min-split-size=1M \
          --retry-wait=5 \
          --max-tries=20 \
          --continue=true \
          --auto-file-renaming=false \
          --allow-overwrite=true \
          --header="User-Agent: $UA" \
          --header="Referer: $URL" \
          --dir=downloads \
          --out=direct_video.mp4 \
          "$URL" || true

    #######################################################################
    # EXTRACT STREAMS
    #######################################################################

    - name: Extract HLS links
      continue-on-error: true
      run: |

        yt-dlp \
          --dump-json \
          --skip-download \
          --user-agent "$UA" \
          "$URL" > info.json || true

        jq -r '
          .formats[]?.url // empty
        ' info.json \
        | grep -i "m3u8" \
        | sort -u \
        > links.txt || true

        echo "Detected streams:"
        cat links.txt || true

    #######################################################################
    # HLS FALLBACK
    #######################################################################

    - name: HLS fallback parser
      continue-on-error: true
      run: |

        set -Eeuo pipefail

        if [ ! -s links.txt ]; then
          echo "No HLS links found"
          exit 0
        fi

        echo "Sorting streams by quality"

        SORTED=$(mktemp)

        (
          grep -i "2160\|4k" links.txt || true
          grep -i "1440" links.txt || true
          grep -i "1080" links.txt || true
          grep -i "720" links.txt || true
          grep -i "480" links.txt || true
          grep -i "360" links.txt || true
          grep -i "240" links.txt || true
        ) | awk '!seen[$0]++' > "$SORTED"

        echo "Priority order:"
        cat "$SORTED"

        INDEX=0

        while read -r LINK
        do

          [ -z "$LINK" ] && continue

          echo "Trying stream:"
          echo "$LINK"

          OUT="downloads/hls_${INDEX}.mp4"

          ffmpeg \
            -hide_banner \
            -loglevel warning \
            -y \
            -user_agent "$UA" \
            -headers $'Referer: '"$URL"$'\r\nOrigin: https://'"$DOMAIN"$'\r\nUser-Agent: '"$UA"$'\r\n' \
            -i "$LINK" \
            -c copy \
            "$OUT"

          if [ -f "$OUT" ]; then

            SIZE=$(stat -c%s "$OUT" || echo 0)

            if [ "$SIZE" -gt 5000000 ]; then

              echo "SUCCESS"
              echo "Downloaded: $OUT"

              ffprobe \
                -v error \
                -select_streams v:0 \
                -show_entries stream=width,height,bit_rate \
                -of default=noprint_wrappers=1 \
                "$OUT" || true

              break

            else

              echo "Broken stream"

              rm -f "$OUT" || true
            fi
          fi

          INDEX=$((INDEX+1))

        done < "$SORTED"

    #######################################################################
    # DASH
    #######################################################################

    - name: DASH fallback
      continue-on-error: true
      run: |

        if [ "$TYPE" != "DASH" ]; then
          exit 0
        fi

        ffmpeg \
          -hide_banner \
          -loglevel warning \
          -y \
          -user_agent "$UA" \
          -i "$URL" \
          -c copy \
          downloads/dash_video.mp4 || true

    #######################################################################
    # CLOUDFLARE
    #######################################################################

    - name: Cloudflare bypass attempt
      continue-on-error: true
      run: |

        curl \
          -L \
          --compressed \
          --http2 \
          -A "$UA" \
          -e "$URL" \
          -H "Accept: */*" \
          -H "Accept-Language: en-US,en;q=0.9" \
          -H "Cache-Control: no-cache" \
          -o temp/page.html \
          "$URL" || true

        grep -i cloudflare temp/page.html || true

    #######################################################################
    # RECOVERY
    #######################################################################

    - name: Recovery move
      continue-on-error: true
      run: |

        find . -maxdepth 1 -type f \
        \( \
          -iname "*.mp4" -o \
          -iname "*.mkv" -o \
          -iname "*.webm" -o \
          -iname "*.mov" -o \
          -iname "*.avi" \
        \) \
        -exec mv -f {} downloads/ \; || true

    #######################################################################
    # VERIFY
    #######################################################################

    - name: Verify downloads
      run: |

        echo "Files:"
        find downloads -type f

        VIDEO_COUNT=$(find downloads -type f \
          \( \
            -iname "*.mp4" -o \
            -iname "*.mkv" -o \
            -iname "*.webm" -o \
            -iname "*.mov" -o \
            -iname "*.avi" \
          \) | wc -l)

        echo "Video count:"
        echo "$VIDEO_COUNT"

        if [ "$VIDEO_COUNT" -eq 0 ]; then
          echo "ERROR: no video downloaded"
          exit 1
        fi

    #######################################################################
    # MEDIA INFO
    #######################################################################

    - name: Media analysis
      continue-on-error: true
      run: |

        for file in downloads/*
        do

          if [ -f "$file" ]; then

            echo "================================="
            echo "FILE: $file"
            echo "================================="

            mediainfo "$file" || true
          fi

        done

    #######################################################################
    # SIZE CHECK
    #######################################################################

    - name: Validate size
      continue-on-error: true
      run: |

        for file in downloads/*
        do

          [ ! -f "$file" ] && continue

          SIZE=$(stat -c%s "$file" || echo 0)

          echo "$file => $SIZE bytes"

          if [ "$SIZE" -lt 50000 ]; then
            echo "Tiny file warning"
          fi

        done

    #######################################################################
    # GIT STATUS
    #######################################################################

    - name: Git status
      run: |
        git status

    #######################################################################
    # COMMIT
    #######################################################################

    - name: Commit downloads
      run: |

        git config --global user.name "github-actions[bot]"

        git config --global user.email \
          "41898282+github-actions[bot]@users.noreply.github.com"

        git add downloads || true

        git diff --cached --quiet && echo "No changes" && exit 0

        git commit -m "Downloaded video"

    #######################################################################
    # PUSH
    #######################################################################

    - name: Push changes
      run: |
        git push origin HEAD

    #######################################################################
    # FINAL
    #######################################################################

    - name: Final summary
      run: |

        echo "===================================="
        echo "DOWNLOAD COMPLETED"
        echo "===================================="

        echo "Files:"
        ls -lah downloads || true

        echo "===================================="

        du -sh downloads || true

        echo "===================================="
