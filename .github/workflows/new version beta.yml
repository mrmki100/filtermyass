name: Video Downloader V6 Ultra

on:
  workflow_dispatch:
    inputs:
      url1:
        required: false
        type: string
      url2:
        required: false
        type: string
      url3:
        required: false
        type: string
      url4:
        required: false
        type: string
      url5:
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: downloader
  cancel-in-progress: false

jobs:

  download:

    runs-on: ubuntu-latest

    container:
      image: mcr.microsoft.com/playwright/python:v1.59.0-noble

    timeout-minutes: 360

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fix git
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          chown -R root:root "$GITHUB_WORKSPACE" || true

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: /github/home/.cache/pip
          key: pip-${{ runner.os }}

      - name: Cache playwright
        uses: actions/cache@v4
        with:
          path: /ms-playwright
          key: playwright-${{ runner.os }}

      - name: Install tools
        run: |

          apt-get update

          apt-get install -y \
            ffmpeg \
            curl \
            wget \
            jq \
            aria2 \
            p7zip-full

          python3 -m pip install --upgrade pip

          pip install -U \
            yt-dlp \
            playwright

          playwright install chromium || true

          yt-dlp -U || true

      - name: Prepare URLs
        run: |

          cat > urls.txt <<EOF
          ${{ github.event.inputs.url1 }}
          ${{ github.event.inputs.url2 }}
          ${{ github.event.inputs.url3 }}
          ${{ github.event.inputs.url4 }}
          ${{ github.event.inputs.url5 }}
          EOF

          cat urls.txt \
          | sed '/^$/d' \
          | sort -u \
          > clean.txt

          mv clean.txt urls.txt

          echo "========== URLS =========="
          cat urls.txt || true

      - name: Create browser extractor
        run: |

          cat > intercept.py << 'PY'
          import sys
          import json
          import re
          from playwright.sync_api import sync_playwright

          url = sys.argv[1]

          found = []

          VIDEO_PATTERNS = [
              ".mp4",
              ".m3u8",
              ".mpd",
              ".webm",
              ".mov",
              "playlist",
              "manifest",
              "stream"
          ]

          BAD = [
              ".jpg",
              ".jpeg",
              ".png",
              ".gif",
              ".svg",
              ".css",
              ".js",
              "analytics",
              "doubleclick",
              "ads"
          ]

          def valid(u):

              ul = u.lower()

              for b in BAD:
                  if b in ul:
                      return False

              for p in VIDEO_PATTERNS:
                  if p in ul:
                      return True

              return False

          with sync_playwright() as p:

              browser = p.chromium.launch(
                  headless=True,
                  args=[
                      "--disable-blink-features=AutomationControlled",
                      "--no-sandbox",
                      "--disable-dev-shm-usage"
                  ]
              )

              context = browser.new_context(
                  viewport={"width": 1920, "height": 1080},
                  user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/124 Safari/537.36",
                  locale="en-US"
              )

              page = context.new_page()

              def collect(r):

                  try:

                      u = r.url
                      ct = r.headers.get("content-type", "")

                      if valid(u):
                          found.append(u)

                      if "video" in ct:
                          found.append(u)

                      if "mpegurl" in ct:
                          found.append(u)

                  except:
                      pass

              page.on("response", collect)

              try:

                  page.goto(
                      url,
                      timeout=120000,
                      wait_until="networkidle"
                  )

                  page.mouse.move(500, 500)

                  page.wait_for_timeout(10000)

                  try:
                      page.click("button")
                  except:
                      pass

                  page.wait_for_timeout(20000)

              except:
                  pass

              browser.close()

          final = []

          for x in found:
              if x not in final:
                  final.append(x)

          print(json.dumps(final))
          PY

      - name: Download videos
        run: |

          set +e

          mkdir -p downloads

          while IFS= read -r URL
          do

            [ -z "$URL" ] && continue

            echo "====================================="
            echo "PROCESSING: $URL"
            echo "====================================="

            ID=$(date +%s)_$RANDOM

            DIR="downloads/$ID"

            mkdir -p "$DIR"

            UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/124 Safari/537.36"

            yt-dlp \
              --ignore-errors \
              --continue \
              --retries 25 \
              --fragment-retries 25 \
              --extractor-retries 25 \
              --retry-sleep 5 \
              --concurrent-fragments 4 \
              --geo-bypass \
              --geo-bypass-country US \
              --no-playlist \
              --restrict-filenames \
              --socket-timeout 30 \
              --user-agent "$UA" \
              --add-header "User-Agent:$UA" \
              --add-header "Accept-Language:en-US,en;q=0.9" \
              --add-header "Referer:https://www.google.com/" \
              --add-header "Origin:https://www.google.com" \
              --merge-output-format mp4 \
              -f "bv*+ba/b" \
              -o "$DIR/%(title).100s_%(id)s.%(ext)s" \
              "$URL" || true

            FILE=$(find "$DIR" -type f \
              | grep -Ei '\.mp4$|\.mkv$|\.webm$|\.mov$' \
              | head -n1 || true)

            SIZE=0

            if [ ! -z "$FILE" ]; then
              SIZE=$(stat -c%s "$FILE" 2>/dev/null || echo 0)
            fi

            if [ -z "$FILE" ] || [ "$SIZE" -lt 5000000 ]; then

              echo "PRIMARY FAILED -> PLAYWRIGHT"

              rm -f "$DIR"/* || true

              python3 intercept.py "$URL" > "$DIR/media.json" 2>/dev/null || true

              cat "$DIR/media.json" \
              | jq -r '.[]' \
              | grep -Ei '\.m3u8|\.mp4|\.mpd|\.webm|manifest|playlist|stream' \
              | sort -u \
              > "$DIR/links.txt" || true

              SUCCESS=0

              while read MEDIA
              do

                [ -z "$MEDIA" ] && continue

                echo "TRYING: $MEDIA"

                yt-dlp \
                  --ignore-errors \
                  --no-check-certificates \
                  --geo-bypass \
                  --hls-use-mpegts \
                  --retries 20 \
                  --fragment-retries 20 \
                  --socket-timeout 30 \
                  --user-agent "$UA" \
                  --add-header "User-Agent:$UA" \
                  --add-header "Referer:$URL" \
                  --add-header "Accept-Language:en-US,en;q=0.9" \
                  -f best \
                  --merge-output-format mp4 \
                  -o "$DIR/video.%(ext)s" \
                  "$MEDIA" \
                  && SUCCESS=1 && break

                aria2c \
                  --max-connection-per-server=8 \
                  --split=8 \
                  --min-split-size=1M \
                  --retry-wait=5 \
                  --max-tries=20 \
                  --user-agent="$UA" \
                  --referer="$URL" \
                  -d "$DIR" \
                  -o "video.mp4" \
                  "$MEDIA" \
                  && SUCCESS=1 && break

                curl -L \
                  --retry 20 \
                  --retry-delay 5 \
                  -A "$UA" \
                  -e "$URL" \
                  "$MEDIA" \
                  -o "$DIR/video.mp4" \
                  && SUCCESS=1 && break

              done < "$DIR/links.txt"

            fi

            FILE=$(find "$DIR" -type f \
              | grep -Ei '\.mp4$|\.mkv$|\.webm$|\.mov$' \
              | head -n1 || true)

            if [ ! -z "$FILE" ]; then

              SIZE=$(stat -c%s "$FILE" 2>/dev/null || echo 0)

              echo "FINAL SIZE: $SIZE"

              if [ "$SIZE" -lt 5000000 ]; then
                echo "BAD FILE REMOVED"
                rm -f "$FILE" || true
              fi

              if [ "$SIZE" -gt 95000000 ]; then

                echo "COMPRESSING"

                7z a -v90m "$DIR/video.7z" "$FILE" || true

                rm -f "$FILE" || true

              fi

            fi

          done < urls.txt

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-videos
          path: downloads
          if-no-files-found: ignore

      - name: Commit
        run: |

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add downloads || true

          if git diff --cached --quiet; then
            echo "NO FILES"
            exit 0
          fi

          git commit -m "downloaded videos" || true

          git pull --rebase origin "${GITHUB_REF_NAME}" || true

          git push origin HEAD:${GITHUB_REF_NAME} || true
