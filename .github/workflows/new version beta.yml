name: Universal Video Downloader V16 Ultimate PRO

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Video URL"
        required: true
      filename:
        description: "Custom filename"
        required: false
      quality:
        description: "Quality (best/1080/720/480)"
        required: false
        default: "best"

permissions:
  contents: write

concurrency:
  group: universal-video-downloader
  cancel-in-progress: false

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      URL: ${{ github.event.inputs.url }}
      CUSTOM_NAME: ${{ github.event.inputs.filename }}
      QUALITY: ${{ github.event.inputs.quality }}

    steps:

    #######################################################################
    # CHECKOUT
    #######################################################################

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
        persist-credentials: true

    #######################################################################
    # PREPARE
    #######################################################################

    - name: Prepare directories
      run: |
        mkdir -p downloads
        mkdir -p temp
        mkdir -p cookies
        mkdir -p logs
        mkdir -p fragments
        mkdir -p ffmpeg_temp

        touch downloads/.gitkeep || true

        echo "Workspace:"
        pwd

        echo "Files:"
        ls -la

    #######################################################################
    # CACHE
    #######################################################################

    - name: Cache temp files
      uses: actions/cache@v4
      with:
        path: |
          temp
          fragments
        key: downloader-${{ runner.os }}-${{ github.run_id }}

    #######################################################################
    # INSTALL DEPENDENCIES
    #######################################################################

    - name: Install dependencies
      run: |
        sudo apt-get update

        sudo apt-get install -y \
          ffmpeg \
          jq \
          curl \
          wget \
          git \
          python3 \
          python3-pip \
          aria2 \
          mediainfo \
          dnsutils \
          unzip \
          tar \
          gzip \
          sed \
          grep \
          coreutils

        python3 -m pip install --upgrade pip

        pip install --upgrade yt-dlp

        echo "Versions:"
        yt-dlp --version
        ffmpeg -version | head
        aria2c --version | head

    #######################################################################
    # USER AGENTS
    #######################################################################

    - name: Generate headers
      run: |
        cat > agents.txt <<EOF
Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/137.0 Safari/537.36
Mozilla/5.0 (Macintosh; Intel Mac OS X 14_0) AppleWebKit/537.36 Chrome/137.0 Safari/537.36
Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/137.0 Safari/537.36
Mozilla/5.0 (iPhone; CPU iPhone OS 18_0 like Mac OS X) AppleWebKit/605.1.15 Version/18.0 Mobile Safari/604.1
Mozilla/5.0 (Linux; Android 15) AppleWebKit/537.36 Chrome/137.0 Mobile Safari/537.36
EOF

        UA=$(shuf -n 1 agents.txt)

        echo "UA=$UA" >> $GITHUB_ENV

        DOMAIN=$(echo "$URL" | awk -F/ '{print $3}')

        echo "DOMAIN=$DOMAIN" >> $GITHUB_ENV

    #######################################################################
    # NETWORK DEBUG
    #######################################################################

    - name: Network diagnostics
      continue-on-error: true
      run: |
        echo "DNS:"
        nslookup $DOMAIN || true

        echo "HEAD REQUEST:"
        curl -I \
          -L \
          --max-time 20 \
          -A "$UA" \
          "$URL" || true

    #######################################################################
    # URL INFO
    #######################################################################

    - name: Detect source
      run: |
        echo "Input URL:"
        echo "$URL"

        if echo "$URL" | grep -qi "m3u8"; then
          echo "TYPE=HLS" >> $GITHUB_ENV
        elif echo "$URL" | grep -qi "mpd"; then
          echo "TYPE=DASH" >> $GITHUB_ENV
        else
          echo "TYPE=NORMAL" >> $GITHUB_ENV
        fi

    #######################################################################
    # COOKIES
    #######################################################################

    - name: Create cookie jar
      run: |
        touch cookies/cookies.txt

    #######################################################################
    # YT-DLP PRIMARY DOWNLOAD
    #######################################################################

    - name: yt-dlp main download
      id: primary
      continue-on-error: true
      run: |

        OUTPUT="downloads/video_%(id)s.%(ext)s"

        if [ -n "$CUSTOM_NAME" ]; then
          OUTPUT="downloads/${CUSTOM_NAME}.%(ext)s"
        fi

        FORMAT="bestvideo+bestaudio/best"

        if [ "$QUALITY" = "1080" ]; then
          FORMAT="bestvideo[height<=1080]+bestaudio/best[height<=1080]"
        fi

        if [ "$QUALITY" = "720" ]; then
          FORMAT="bestvideo[height<=720]+bestaudio/best[height<=720]"
        fi

        if [ "$QUALITY" = "480" ]; then
          FORMAT="bestvideo[height<=480]+bestaudio/best[height<=480]"
        fi

        yt-dlp \
          --verbose \
          --no-playlist \
          --ignore-errors \
          --continue \
          --retries 20 \
          --fragment-retries 20 \
          --retry-sleep 5 \
          --socket-timeout 60 \
          --user-agent "$UA" \
          --referer "$URL" \
          --cookies cookies/cookies.txt \
          --concurrent-fragments 10 \
          --extractor-retries 10 \
          --file-access-retries 10 \
          --http-chunk-size 10M \
          --merge-output-format mp4 \
          --remux-video mp4 \
          --format "$FORMAT" \
          -o "$OUTPUT" \
          "$URL"

    #######################################################################
    # ARIA2 DIRECT DOWNLOAD
    #######################################################################

    - name: Direct aria2 fallback
      if: steps.primary.outcome != 'success'
      continue-on-error: true
      run: |

        echo "Trying direct download..."

        aria2c \
          --max-connection-per-server=16 \
          --split=16 \
          --min-split-size=1M \
          --retry-wait=5 \
          --max-tries=20 \
          --continue=true \
          --auto-file-renaming=false \
          --allow-overwrite=true \
          --header="User-Agent: $UA" \
          --header="Referer: $URL" \
          --dir=downloads \
          --out=direct_video.mp4 \
          "$URL"

    #######################################################################
    # HLS DETECTOR
    #######################################################################

    - name: Extract HLS links
      continue-on-error: true
      run: |

        yt-dlp \
          --dump-json \
          --skip-download \
          "$URL" > info.json || true

        cat info.json | jq -r '
          .formats[]?.url // empty
        ' | grep "m3u8" > links.txt || true

        cat links.txt || true

    #######################################################################
    # HLS DOWNLOAD
    #######################################################################

    - name: HLS fallback parser
      continue-on-error: true
      run: |

        if [ ! -f links.txt ]; then
          exit 0
        fi

        INDEX=0

        while true
        do

          LINK=$(sed -n "$((INDEX+1))p" links.txt)

          if [ -z "$LINK" ]; then
            break
          fi

          echo "Trying HLS:"
          echo "$LINK"

          ffmpeg \
            -y \
            -loglevel warning \
            -user_agent "$UA" \
            -headers $'Referer: '"$URL"$'\r\nOrigin: https://'"$DOMAIN"$'\r\nUser-Agent: '"$UA"$'\r\n' \
            -i "$LINK" \
            -c copy \
            "downloads/hls_$INDEX.mp4" && break

          INDEX=$((INDEX+1))

        done

    #######################################################################
    # DASH FALLBACK
    #######################################################################

    - name: DASH fallback
      continue-on-error: true
      run: |

        if [ "$TYPE" != "DASH" ]; then
          exit 0
        fi

        ffmpeg \
          -y \
          -loglevel warning \
          -user_agent "$UA" \
          -i "$URL" \
          -c copy \
          downloads/dash_video.mp4 || true

    #######################################################################
    # CLOUDFLARE BYPASS ATTEMPT
    #######################################################################

    - name: Cloudflare bypass strategy
      continue-on-error: true
      run: |

        curl \
          -L \
          --compressed \
          --http2 \
          -A "$UA" \
          -e "$URL" \
          -H "Accept: */*" \
          -H "Accept-Language: en-US,en;q=0.9" \
          -H "Cache-Control: no-cache" \
          -o temp/page.html \
          "$URL" || true

        grep -i "cloudflare" temp/page.html || true

    #######################################################################
    # RECOVERY ROOT FILES
    #######################################################################

    - name: Recovery move
      continue-on-error: true
      run: |

        find . -maxdepth 1 -type f \
          \( \
          -iname "*.mp4" -o \
          -iname "*.mkv" -o \
          -iname "*.webm" -o \
          -iname "*.mov" -o \
          -iname "*.avi" \
          \) \
          -exec mv {} downloads/ \; || true

    #######################################################################
    # FINAL RECOVERY
    #######################################################################

    - name: Deep recovery
      continue-on-error: true
      run: |

        find . -type f \
          \( \
          -iname "*.mp4" -o \
          -iname "*.mkv" -o \
          -iname "*.webm" -o \
          -iname "*.mov" -o \
          -iname "*.avi" \
          \) \
          -exec cp {} downloads/ \; || true

    #######################################################################
    # VERIFY FILES
    #######################################################################

    - name: Verify downloads
      run: |

        echo "Downloaded files:"
        find downloads -type f

        COUNT=$(find downloads -type f | wc -l)

        echo "COUNT=$COUNT"

        if [ "$COUNT" -eq 0 ]; then
          echo "ERROR: No files downloaded"
          exit 1
        fi

    #######################################################################
    # MEDIA INFO
    #######################################################################

    - name: Media analysis
      continue-on-error: true
      run: |

        for file in downloads/*
        do
          echo "FILE: $file"

          mediainfo "$file" || true
        done

    #######################################################################
    # FILE SIZE CHECK
    #######################################################################

    - name: Validate size
      continue-on-error: true
      run: |

        for file in downloads/*
        do

          SIZE=$(stat -c%s "$file" || echo 0)

          echo "$file => $SIZE bytes"

          if [ "$SIZE" -lt 50000 ]; then
            echo "Tiny file warning"
          fi

        done

    #######################################################################
    # GIT STATUS
    #######################################################################

    - name: Git status
      run: |
        git status

    #######################################################################
    # COMMIT
    #######################################################################

    - name: Commit files
      run: |

        git config --global user.name "github-actions[bot]"

        git config --global user.email \
          "41898282+github-actions[bot]@users.noreply.github.com"

        git add downloads || true

        git diff --cached --quiet && echo "No changes" && exit 0

        git commit -m "Downloaded video"

    #######################################################################
    # PUSH
    #######################################################################

    - name: Push changes
      run: |
        git push origin HEAD

    #######################################################################
    # FINAL OUTPUT
    #######################################################################

    - name: Final summary
      run: |

        echo "===================================="
        echo "DOWNLOAD COMPLETED"
        echo "===================================="

        echo "Files:"
        ls -lah downloads

        echo "===================================="

        du -sh downloads || true

        echo "===================================="
