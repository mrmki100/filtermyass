name: V10 Ultra Stealth Downloader

on:
  workflow_dispatch:
    inputs:
      url1:
        required: false
        type: string
      url2:
        required: false
        type: string
      url3:
        required: false
        type: string
      url4:
        required: false
        type: string
      url5:
        required: false
        type: string

jobs:

  download:

    runs-on: ubuntu-latest

    container:
      image: mcr.microsoft.com/playwright/python:v1.59.0-noble

    timeout-minutes: 360

    steps:

      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |

          apt-get update

          apt-get install -y \
            ffmpeg \
            jq \
            curl \
            wget \
            aria2

          python3 -m pip install --upgrade pip

          pip install yt-dlp playwright

          playwright install chromium

      - name: Build URL List
        run: |

          cat > urls.txt <<EOF
          ${{ github.event.inputs.url1 }}
          ${{ github.event.inputs.url2 }}
          ${{ github.event.inputs.url3 }}
          ${{ github.event.inputs.url4 }}
          ${{ github.event.inputs.url5 }}
          EOF

          sed '/^$/d' urls.txt > tmp.txt
          mv tmp.txt urls.txt

      - name: Create Ultra Extractor
        run: |

          cat > extractor.py << 'PY'
          import sys
          import json
          import re

          from playwright.sync_api import sync_playwright

          url = sys.argv[1]

          media = set()

          def valid(u):

              u = u.lower()

              exts = [
                  ".m3u8",
                  ".mp4",
                  ".mpd"
              ]

              return any(x in u for x in exts)

          with sync_playwright() as p:

              browser = p.chromium.launch(
                  headless=True,
                  args=[
                      "--disable-blink-features=AutomationControlled",
                      "--no-sandbox",
                      "--disable-dev-shm-usage"
                  ]
              )

              context = browser.new_context(
                  viewport={
                      "width": 1366,
                      "height": 768
                  },
                  user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/124 Safari/537.36"
              )

              page = context.new_page()

              page.set_extra_http_headers({
                  "Accept-Language": "en-US,en;q=0.9",
                  "Referer": "https://www.google.com/"
              })

              def capture_response(response):

                  try:
                      u = response.url

                      if valid(u):
                          media.add(u)

                  except:
                      pass

              def capture_request(request):

                  try:
                      u = request.url

                      if valid(u):
                          media.add(u)

                  except:
                      pass

              page.on("response", capture_response)
              page.on("request", capture_request)

              try:

                  page.goto(
                      url,
                      wait_until="networkidle",
                      timeout=120000
                  )

                  page.wait_for_timeout(15000)

                  html = page.content()

                  patterns = [
                      r'https:[^"]+\.m3u8[^"]*',
                      r'https:[^"]+\.mp4[^"]*',
                      r'https:[^"]+\.mpd[^"]*'
                  ]

                  for ptn in patterns:

                      matches = re.findall(ptn, html)

                      for m in matches:
                          media.add(m)

                  try:
                      page.click("button")
                      page.wait_for_timeout(5000)
                  except:
                      pass

              except Exception as e:
                  print(e)

              browser.close()

          print(json.dumps(list(media)))
          PY

      - name: Download Videos
        run: |

          mkdir -p downloads

          while read URL
          do

            [ -z "$URL" ] && continue

            echo "=================================="
            echo "PROCESSING"
            echo "$URL"
            echo "=================================="

            ID=$(date +%s)_$RANDOM

            DIR="downloads/$ID"

            mkdir -p "$DIR"

            python3 extractor.py "$URL" > "$DIR/media.json"

            echo "FOUND MEDIA:"
            cat "$DIR/media.json"

            cat "$DIR/media.json" | jq -r '.[]' > "$DIR/media.txt"

            while read STREAM
            do

              [ -z "$STREAM" ] && continue

              echo ""
              echo "TRYING:"
              echo "$STREAM"
              echo ""

              yt-dlp \
                --ignore-errors \
                --retries 30 \
                --fragment-retries 30 \
                --concurrent-fragments 16 \
                --no-check-certificates \
                --geo-bypass \
                --merge-output-format mp4 \
                --downloader aria2c \
                --downloader-args "aria2c:-x 16 -s 16 -k 1M" \
                -S "res,fps,br" \
                -f "bestvideo[height=1080]+bestaudio/bestvideo[height>=1080]+bestaudio/best" \
                -o "$DIR/%(title)s.%(ext)s" \
                "$STREAM"

              FILE=$(find "$DIR" -name "*.mp4" | head -n1)

              if [ ! -z "$FILE" ]; then

                echo ""
                echo "SUCCESS"
                echo "$FILE"
                echo ""

                break

              fi

            done < "$DIR/media.txt"

            echo ""
            echo "FINAL FILES:"
            find "$DIR"

          done < urls.txt

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: ultra-downloads
          path: downloads
