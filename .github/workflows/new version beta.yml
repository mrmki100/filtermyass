name: Universal Video Downloader V14

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Video/Page URL"
        required: true

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            ffmpeg \
            aria2 \
            jq \
            curl \
            wget \
            python3 \
            python3-pip

          pip3 install -U \
            yt-dlp \
            requests \
            beautifulsoup4 \
            lxml

      - name: Prepare folders
        run: |
          mkdir -p downloads
          mkdir -p temp

      - name: Create extractor
        run: |
          cat > extractor.py << 'PY'
          import re
          import json
          import requests
          import sys
          from bs4 import BeautifulSoup

          url = sys.argv[1]

          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/137.0 Safari/537.36",
              "Accept-Language": "en-US,en;q=0.9",
              "Referer": url,
          }

          bad = [
              "ads",
              "doubleclick",
              "tracker",
              "traffic",
              "stats",
              "banner",
              "promo",
              "sprite",
              ".jpg",
              ".png",
              ".webp",
              ".gif",
              ".css",
              ".js",
              "logo",
              "thumbnail",
              "preview"
          ]

          try:
              r = requests.get(
                  url,
                  headers=headers,
                  timeout=30
              )

              html = r.text

              soup = BeautifulSoup(html, "lxml")

              found = set()

              patterns = [
                  r'https://[^"\']+\.m3u8[^"\']*',
                  r'https://[^"\']+\.mp4[^"\']*',
                  r'https://[^"\']+\.webm[^"\']*',
              ]

              for p in patterns:
                  matches = re.findall(p, html)

                  for m in matches:

                      m = m.strip()

                      if any(x in m.lower() for x in bad):
                          continue

                      if len(m) < 15:
                          continue

                      if " " in m:
                          continue

                      found.add(m)

              for tag in soup.find_all(["video", "source", "a"]):

                  for attr in ["src", "href", "data-src"]:

                      v = tag.get(attr)

                      if not v:
                          continue

                      if any(x in v.lower() for x in bad):
                          continue

                      if any(x in v.lower() for x in [".m3u8", ".mp4", ".webm"]):

                          if v.startswith("//"):
                              v = "https:" + v

                          elif v.startswith("/"):
                              base = url.split("/")[0] + "//" + url.split("/")[2]
                              v = base + v

                          found.add(v)

              clean = []

              for x in found:

                  if not x.startswith("http"):
                      continue

                  if "<" in x or ">" in x:
                      continue

                  if ".html" in x:
                      continue

                  clean.append(x)

              print(json.dumps(list(set(clean))))

          except Exception:
              print("[]")
          PY

      - name: Download video
        env:
          URL: ${{ github.event.inputs.url }}
        run: |
          set +e

          mkdir -p downloads

          echo "===================================="
          echo "Target URL:"
          echo "$URL"
          echo "===================================="

          cd downloads

          echo "===================================="
          echo "Trying yt-dlp direct extraction..."
          echo "===================================="

          yt-dlp \
            --ignore-errors \
            --no-playlist \
            --retries 25 \
            --fragment-retries 25 \
            --concurrent-fragments 8 \
            --socket-timeout 30 \
            --extractor-retries 10 \
            --retry-sleep 5 \
            --downloader ffmpeg \
            --hls-use-mpegts \
            --merge-output-format mp4 \
            --remux-video mp4 \
            --geo-bypass \
            --no-check-certificates \
            --restrict-filenames \
            --no-call-home \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/137.0 Safari/537
            --referer "https://www.pornhub.com/" \
            --add-header "Accept-Language:en-US,en;q=0.9" \
            --add-header "Origin:https://www.pornhub.com" \
            --add-header "Sec-Fetch-Dest:empty" \
            --add-header "Sec-Fetch-Mode:cors" \
            --add-header
                        --add-header "Sec-Fetch-Site:same-origin" \
            -o "video.%(ext)s" \
            "$URL"

          STATUS=$?

          echo "===================================="
          echo "Checking downloaded files..."
          echo "===================================="

          ls -lah

          FOUND=$(find . -type f \( \
            -iname "*.mp4" -o \
            -iname "*.mkv" -o \
            -iname "*.webm" -o \
            -iname "*.mov" \
          \) | wc -l)

          echo "FOUND FILES: $FOUND"

          if [ "$FOUND" -eq "0" ]; then

            echo "===================================="
            echo "yt-dlp failed, trying manual extractor..."
            echo "===================================="

            cd ..

            python3 extractor.py "$URL" > links.json

            echo "FOUND MEDIA:"
            cat links.json

            FIRST=$(jq -r '.[0]' links.json)

            if [ "$FIRST" != "null" ] && [ ! -z "$FIRST" ]; then

              echo "===================================="
              echo "Trying extracted link:"
              echo "$FIRST"
              echo "===================================="

              cd downloads

              yt-dlp \
                --ignore-errors \
                --retries 20 \
                --fragment-retries 20 \
                --downloader ffmpeg \
                --hls-use-mpegts \
                --merge-output-format mp4 \
                --referer "$URL" \
                --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/137.0 Safari/537.36" \
                -o "video_fallback.%(ext)s" \
                "$FIRST"

              if [ ! -f video_fallback.mp4 ]; then

                echo "===================================="
                echo "Trying ffmpeg direct..."
                echo "===================================="

                ffmpeg \
                  -headers "Referer: $URL\r\nUser-Agent: Mozilla/5.0\r\n" \
                  -i "$FIRST" \
                  -c copy \
                  fallback_video.mp4
              fi
            fi
          fi

          echo "===================================="
          echo "Final files:"
          echo "===================================="

          find downloads -type f || true

      - name: Commit downloaded videos
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add downloads || true

          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "Add downloaded video"

          git push

      - name: Upload artifact backup
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-video
          path: downloads/
