name: Video Downloader V8 Ultra HD

on:
  workflow_dispatch:
    inputs:
      url1:
        required: false
        type: string
      url2:
        required: false
        type: string
      url3:
        required: false
        type: string
      url4:
        required: false
        type: string
      url5:
        required: false
        type: string

permissions:
  contents: write

jobs:

  download:

    runs-on: ubuntu-latest

    container:
      image: mcr.microsoft.com/playwright/python:v1.59.0-noble

    timeout-minutes: 360

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix Workspace
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          chown -R root:root "$GITHUB_WORKSPACE" || true

      - name: Install Dependencies
        run: |

          apt-get update

          apt-get install -y \
            ffmpeg \
            jq \
            curl \
            wget \
            aria2 \
            p7zip-full

          python3 -m pip install --upgrade pip

          pip install -U yt-dlp playwright

          playwright install chromium || true

      - name: Prepare URLs
        run: |

          cat > urls.txt <<EOF
          ${{ github.event.inputs.url1 }}
          ${{ github.event.inputs.url2 }}
          ${{ github.event.inputs.url3 }}
          ${{ github.event.inputs.url4 }}
          ${{ github.event.inputs.url5 }}
          EOF

          sed '/^$/d' urls.txt | sort -u > clean.txt

          mv clean.txt urls.txt

          echo "URLS:"
          cat urls.txt

      - name: Create Playwright Extractor
        run: |

          cat > intercept.py << 'PY'
          import sys
          import json
          from playwright.sync_api import sync_playwright

          url=sys.argv[1]

          found=[]

          with sync_playwright() as p:

              browser=p.chromium.launch(headless=True)

              page=browser.new_page()

              def handle_response(r):

                  u=r.url.lower()

                  if (
                      ".m3u8" in u or
                      ".mpd" in u or
                      ".mp4" in u or
                      "master.m3u8" in u
                  ):

                      found.append(r.url)

              page.on("response",handle_response)

              try:

                  page.goto(url,timeout=120000)

                  page.wait_for_timeout(25000)

              except:
                  pass

              browser.close()

          found=list(dict.fromkeys(found))

          print(json.dumps(found))
          PY

      - name: Download Videos
        run: |

          set +e

          mkdir -p downloads

          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/124 Safari/537.36"

          while IFS= read -r URL
          do

            [ -z "$URL" ] && continue

            echo "=========================================="
            echo "PROCESSING:"
            echo "$URL"
            echo "=========================================="

            ID=$(date +%s)_$RANDOM

            DIR="downloads/$ID"

            mkdir -p "$DIR"

            echo ""
            echo "STEP 1 -> DETECT AVAILABLE QUALITIES"
            echo ""

            yt-dlp \
              --user-agent "$UA" \
              --add-header "User-Agent:$UA" \
              --add-header "Referer:https://www.google.com/" \
              -F "$URL" > "$DIR/formats.txt" 2>&1 || true

            cat "$DIR/formats.txt"

            echo ""
            echo "STEP 2 -> TRY TO DOWNLOAD 1080p"
            echo ""

            yt-dlp \
              --ignore-errors \
              --retries 30 \
              --fragment-retries 30 \
              --concurrent-fragments 8 \
              --geo-bypass \
              --no-playlist \
              --merge-output-format mp4 \
              --user-agent "$UA" \
              --add-header "User-Agent:$UA" \
              --add-header "Referer:https://www.google.com/" \
              --add-header "Accept-Language:en-US,en;q=0.9" \
              -S "res,br,fps" \
              -f "bestvideo[height=1080]+bestaudio/best[height=1080]" \
              -o "$DIR/%(title).100s_%(id)s.%(ext)s" \
              "$URL"

            FILE=$(find "$DIR" -type f | grep -Ei '\.mp4$|\.mkv$|\.webm$' | head -n1 || true)

            SIZE=0

            if [ ! -z "$FILE" ]; then
              SIZE=$(stat -c%s "$FILE")
            fi

            if [ -z "$FILE" ] || [ "$SIZE" -lt 10000000 ]; then

              echo ""
              echo "1080p NOT FOUND"
              echo "TRYING BEST AVAILABLE QUALITY"
              echo ""

              yt-dlp \
                --ignore-errors \
                --retries 30 \
                --fragment-retries 30 \
                --concurrent-fragments 8 \
                --geo-bypass \
                --no-playlist \
                --merge-output-format mp4 \
                --user-agent "$UA" \
                --add-header "User-Agent:$UA" \
                --add-header "Referer:https://www.google.com/" \
                --add-header "Accept-Language:en-US,en;q=0.9" \
                -S "res,br,fps" \
                -f "bestvideo+bestaudio/best" \
                -o "$DIR/%(title).100s_%(id)s.%(ext)s" \
                "$URL"

            fi

            FILE=$(find "$DIR" -type f | grep -Ei '\.mp4$|\.mkv$|\.webm$' | head -n1 || true)

            SIZE=0

            if [ ! -z "$FILE" ]; then
              SIZE=$(stat -c%s "$FILE")
            fi

            if [ -z "$FILE" ] || [ "$SIZE" -lt 10000000 ]; then

              echo ""
              echo "PRIMARY DOWNLOAD FAILED"
              echo "USING PLAYWRIGHT EXTRACTION"
              echo ""

              python3 intercept.py "$URL" > "$DIR/media.json" || true

              cat "$DIR/media.json"

              cat "$DIR/media.json" | jq -r '.[]' | sort -u > "$DIR/links.txt"

              while IFS= read -r MEDIA
              do

                [ -z "$MEDIA" ] && continue

                echo ""
                echo "TRY MEDIA:"
                echo "$MEDIA"
                echo ""

                yt-dlp \
                  --ignore-errors \
                  --retries 30 \
                  --fragment-retries 30 \
                  --concurrent-fragments 8 \
                  --hls-use-mpegts \
                  --merge-output-format mp4 \
                  --user-agent "$UA" \
                  --add-header "Referer:$URL" \
                  -S "res,br,fps" \
                  -f "bestvideo[height=1080]+bestaudio/best[height=1080]/bestvideo+bestaudio/best" \
                  -o "$DIR/fallback.%(ext)s" \
                  "$MEDIA"

                FILE=$(find "$DIR" -type f | grep -Ei '\.mp4$|\.mkv$|\.webm$' | head -n1 || true)

                SIZE=0

                if [ ! -z "$FILE" ]; then
                  SIZE=$(stat -c%s "$FILE")
                fi

                if [ ! -z "$FILE" ] && [ "$SIZE" -gt 10000000 ]; then
                  echo "SUCCESS"
                  break
                fi

              done < "$DIR/links.txt"

            fi

            echo ""
            echo "FINAL RESULT"
            echo ""

            find "$DIR" -type f

            FINAL=$(find "$DIR" -type f | grep -Ei '\.mp4$|\.mkv$|\.webm$' | head -n1 || true)

            if [ ! -z "$FINAL" ]; then

              echo ""
              echo "VIDEO INFO:"
              echo ""

              ffprobe "$FINAL" 2>&1 | grep -E "Video:|Audio:"
            fi

            echo ""
            echo "DONE"
            echo ""

          done < urls.txt

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-videos
          path: downloads
          if-no-files-found: ignore
          retention-days: 7
