name: Universal Video Downloader V15

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Video/Page URL"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: universal-video-downloader
  cancel-in-progress: false

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      PYTHONUNBUFFERED: 1

    steps:

      ####################################################################
      # LIGHTWEIGHT CHECKOUT
      ####################################################################

      - name: Checkout repository (minimal)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true
          sparse-checkout: |
            downloads

      ####################################################################
      # CACHE
      ####################################################################

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-v15
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache yt-dlp
        uses: actions/cache@v4
        with:
          path: ~/.cache/yt-dlp
          key: ${{ runner.os }}-ytdlp-v15
          restore-keys: |
            ${{ runner.os }}-ytdlp-

      - name: Cache ffmpeg temp
        uses: actions/cache@v4
        with:
          path: temp
          key: ${{ runner.os }}-ffmpeg-temp-v15
          restore-keys: |
            ${{ runner.os }}-ffmpeg-temp-

      ####################################################################
      # SYSTEM DEPENDENCIES
      ####################################################################

      - name: Install dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            ffmpeg \
            jq \
            curl \
            wget \
            aria2 \
            mediainfo \
            python3 \
            python3-pip

          pip3 install -U \
            yt-dlp \
            requests \
            beautifulsoup4 \
            lxml

      ####################################################################
      # PREPARE
      ####################################################################

      - name: Prepare workspace
        run: |
          mkdir -p downloads
          mkdir -p temp

          git config --global core.compression 9
          git config --global gc.auto 0

      ####################################################################
      # CREATE ADVANCED EXTRACTOR
      ####################################################################

      - name: Create advanced extractor
        run: |
          cat > extractor.py << 'PY'
          import re
          import json
          import requests
          import sys
          from bs4 import BeautifulSoup
          from urllib.parse import urljoin, urlparse

          TARGET = sys.argv[1]

          parsed = urlparse(TARGET)

          DOMAIN = f"{parsed.scheme}://{parsed.netloc}"

          USER_AGENTS = [
              "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/137.0 Safari/537.36",
              "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/137.0 Safari/537.36",
              "Mozilla/5.0 (iPhone; CPU iPhone OS 18_0 like Mac OS X) AppleWebKit/605.1.15 Version/18.0 Mobile Safari/604.1"
          ]

          BAD_WORDS = [
              "ads",
              "doubleclick",
              "tracker",
              "stats",
              "analytics",
              "promo",
              "banner",
              "thumbnail",
              "preview",
              "sprite",
              ".jpg",
              ".jpeg",
              ".png",
              ".gif",
              ".webp",
              ".svg",
              ".css",
              ".js",
              ".woff",
              ".ttf",
              ".ico"
          ]

          PATTERNS = [
              r'https://[^"\']+\.m3u8[^"\']*',
              r'https://[^"\']+\.mp4[^"\']*',
              r'https://[^"\']+\.webm[^"\']*',
              r'https://[^"\']+\.mkv[^"\']*',
              r'https://[^"\']+master\.m3u8[^"\']*',
              r'https://[^"\']+index\.m3u8[^"\']*',
              r'https://[^"\']+playlist[^"\']*\.m3u8[^"\']*',
          ]

          HEADERS_LIST = []

          for ua in USER_AGENTS:
              HEADERS_LIST.append({
                  "User-Agent": ua,
                  "Referer": TARGET,
                  "Origin": DOMAIN,
                  "Accept": "*/*",
                  "Accept-Language": "en-US,en;q=0.9",
                  "Connection": "keep-alive",
              })

          found = set()

          def valid(url):
              if not url:
                  return False

              low = url.lower()

              if any(x in low for x in BAD_WORDS):
                  return False

              if len(url) < 12:
                  return False

              if " " in url:
                  return False

              if "<" in url or ">" in url:
                  return False

              return True

          for headers in HEADERS_LIST:

              try:

                  r = requests.get(
                      TARGET,
                      headers=headers,
                      timeout=30,
                      allow_redirects=True
                  )

                  html = r.text

                  soup = BeautifulSoup(html, "lxml")

                  for pattern in PATTERNS:

                      matches = re.findall(pattern, html)

                      for m in matches:

                          if valid(m):
                              found.add(m)

                  for tag in soup.find_all([
                      "video",
                      "source",
                      "a"
                  ]):

                      for attr in [
                          "src",
                          "href",
                          "data-src",
                          "data-video",
                          "data-hls",
                          "data-url"
                      ]:

                          val = tag.get(attr)

                          if not val:
                              continue

                          val = urljoin(TARGET, val)

                          if valid(val):

                              if any(x in val.lower() for x in [
                                  ".mp4",
                                  ".m3u8",
                                  ".webm",
                                  ".mkv"
                              ]):

                                  found.add(val)

              except Exception:
                  pass

          clean = []

          for item in found:

              if item not in clean:
                  clean.append(item)

          print(json.dumps(clean, indent=2))
          PY

      ####################################################################
      # DOWNLOAD
      ####################################################################

      - name: Download video
        env:
          URL: ${{ github.event.inputs.url }}
        run: |
          set +e

          echo "=================================================="
          echo "TARGET URL"
          echo "=================================================="
          echo "$URL"

          DOMAIN=$(echo "$URL" | awk -F/ '{print $1"//"$3}')

          echo "=================================================="
          echo "DOMAIN"
          echo "=================================================="
          echo "$DOMAIN"

          cd downloads

          ##################################################################
          # ATTEMPT 1
          ##################################################################

          echo "=================================================="
          echo "ATTEMPT 1 - STANDARD YT-DLP"
          echo "=================================================="

          yt-dlp \
            --ignore-errors \
            --no-playlist \
            --continue \
            --retries 50 \
            --fragment-retries 50 \
            --extractor-retries 20 \
            --file-access-retries 20 \
            --retry-sleep 5 \
            --socket-timeout 60 \
            --concurrent-fragments 8 \
            --downloader ffmpeg \
            --hls-use-mpegts \
            --merge-output-format mp4 \
            --remux-video mp4 \
            --geo-bypass \
            --no-check-certificates \
            --restrict-filenames \
            --no-call-home \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/137.0 Safari/537.36" \
            --referer "$URL" \
            --add-header "Origin:$DOMAIN" \
            --add-header "Accept:*/*" \
            --add-header "Accept-Language:en-US,en;q=0.9" \
            --add-header "Connection:keep-alive" \
            --add-header "DNT:1" \
            --add-header "Sec-Fetch-Dest:empty" \
            --add-header "Sec-Fetch-Mode:cors" \
            --add-header "Sec-Fetch-Site:same-origin" \
            -o "video.%(ext)s" \
            "$URL"

          ##################################################################
          # CHECK FILES
          ##################################################################

          echo "=================================================="
          echo "CHECKING FILES"
          echo "=================================================="

          COUNT=$(find . -type f \( \
            -iname "*.mp4" -o \
            -iname "*.mkv" -o \
            -iname "*.webm" -o \
            -iname "*.mov" \
          \) | wc -l)

          echo "FOUND FILES: $COUNT"

          ##################################################################
          # FALLBACK EXTRACTOR
          ##################################################################

          if [ "$COUNT" -eq "0" ]; then

            echo "=================================================="
            echo "ATTEMPT 2 - CUSTOM EXTRACTOR"
            echo "=================================================="

            cd ..

            python3 extractor.py "$URL" > links.json

            echo "=================================================="
            echo "FOUND MEDIA LINKS"
            echo "=================================================="

            cat links.json

            TOTAL=$(jq length links.json)

            echo "TOTAL LINKS: $TOTAL"

            if [ "$TOTAL" -gt "0" ]; then

              INDEX=0

              while [ $INDEX -lt $TOTAL ]; do

                LINK=$(jq -r ".[$INDEX]" links.json)

                echo "=================================================="
                echo "TRYING LINK $INDEX"
                echo "$LINK"
                echo "=================================================="

                cd downloads

                yt-dlp \
                  --ignore-errors \
                  --continue \
                  --retries 20 \
                  --fragment-retries 20 \
                  --downloader ffmpeg \
                  --hls-use-mpegts \
                  --merge-output-format mp4 \
                  --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/137.0 Safari/537.36" \
                  --referer "$URL" \
                  --add-header "Origin:$DOMAIN" \
                  -o "fallback_${INDEX}.%(ext)s" \
                  "$LINK"

                CHECK=$(find . -type f \( \
                  -iname "*.mp4" -o \
                  -iname "*.mkv" -o \
                  -iname "*.webm" \
                \) | wc -l)

                if [ "$CHECK" -gt "0" ]; then
                  echo "SUCCESS"
                  break
                fi

                echo "=================================================="
                echo "TRYING FFMPEG DIRECT"
                echo "=================================================="

                ffmpeg \
                  -loglevel error \
                  -headers "Referer: $URL\r\nOrigin: $DOMAIN\r\nUser-Agent: Mozilla/5.0\r\n" \
                  -i "$LINK" \
                  -c copy \
                  "ffmpeg_${INDEX}.mp4"

                CHECK2=$(find . -type f \( \
                  -iname "*.mp4" -o \
                  -iname "*.mkv" -o \
                  -iname "*.webm" \
                \) | wc -l)

                if [ "$CHECK2" -gt "0" ]; then
                  echo "FFMPEG SUCCESS"
                  break
                fi

                cd ..

                INDEX=$((INDEX+1))

              done

            fi

          fi

          ##################################################################
          # FINAL CHECK
          ##################################################################

          echo "=================================================="
          echo "FINAL RESULT"
          echo "=================================================="

          find downloads -type f || true

          FINAL=$(find downloads -type f \( \
            -iname "*.mp4" -o \
            -iname "*.mkv" -o \
            -iname "*.webm" -o \
            -iname "*.mov" \
          \) | wc -l)

          echo "FINAL VIDEO COUNT: $FINAL"

          if [ "$FINAL" -eq "0" ]; then
            echo "NO VIDEO DOWNLOADED"
            exit 1
          fi

      ####################################################################
      # SHOW INFO
      ####################################################################

      - name: Media info
        run: |
          echo "=================================================="
          echo "MEDIA INFORMATION"
          echo "=================================================="

          find downloads -type f | while read FILE; do
            echo "--------------------------------------"
            echo "$FILE"
            echo "--------------------------------------"

            mediainfo "$FILE" || true

            echo
          done

      ####################################################################
      # GIT COMMIT
      ####################################################################

      - name: Commit downloaded videos
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add downloads/* || true

          git diff --cached --quiet && echo "NO CHANGES" && exit 0

          git commit -m "Add downloaded video"

          git push

      ####################################################################
      # ARTIFACT BACKUP
      ####################################################################

      - name: Upload artifact backup
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-video
          path: downloads/
          retention-days: 7
