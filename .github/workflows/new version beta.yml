name: V11 Ultra Stable Downloader

on:
  workflow_dispatch:
    inputs:
      url1:
        required: false
        type: string
      url2:
        required: false
        type: string
      url3:
        required: false
        type: string
      url4:
        required: false
        type: string
      url5:
        required: false
        type: string

jobs:

  download:

    runs-on: ubuntu-latest

    container:
      image: mcr.microsoft.com/playwright/python:v1.59.0-noble

    timeout-minutes: 360

    steps:

      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |

          apt-get update

          apt-get install -y \
            ffmpeg \
            jq \
            curl \
            wget \
            aria2

          python3 -m pip install --upgrade pip

          pip install yt-dlp playwright

          playwright install chromium

      - name: Build URL List
        run: |

          cat > urls.txt <<EOF
          ${{ github.event.inputs.url1 }}
          ${{ github.event.inputs.url2 }}
          ${{ github.event.inputs.url3 }}
          ${{ github.event.inputs.url4 }}
          ${{ github.event.inputs.url5 }}
          EOF

          sed '/^$/d' urls.txt > cleaned.txt
          mv cleaned.txt urls.txt

          echo "========== URLS =========="
          cat urls.txt

      - name: Create Extractor
        run: |

          cat > extractor.py << 'PY'
          import sys
          import json
          import re

          from playwright.sync_api import sync_playwright

          url = sys.argv[1]

          media = set()

          def clean(u):

              if not u:
                  return None

              u = u.strip()

              bad_parts = [
                  "&quot;",
                  "&lt;",
                  "&gt;",
                  "<",
                  ">",
                  "thumbnail__container",
                  "javascript:",
                  "blob:"
              ]

              for b in bad_parts:
                  if b in u:
                      return None

              low = u.lower()

              # reject previews
              if "preview" in low:
                  return None

              # reject analytics / tracking
              tracking = [
                  "googleads",
                  "doubleclick",
                  "ads",
                  "tracker",
                  "analytics",
                  "pixel",
                  "deep_pixel"
              ]

              for t in tracking:
                  if t in low:
                      return None

              # reject images
              image_ext = [
                  ".jpg",
                  ".jpeg",
                  ".png",
                  ".gif",
                  ".webp",
                  ".svg"
              ]

              if any(x in low for x in image_ext):
                  return None

              # must be valid http
              if not low.startswith(("http://", "https://")):
                  return None

              # reject malformed combo urls
              if ",.mp4" in low:
                  return None

              # reject broken repeated extensions
              if low.count(".mp4") > 1:
                  return None

              # allowed video formats
              allowed = [
                  ".m3u8",
                  ".mp4",
                  ".mpd"
              ]

              if not any(x in low for x in allowed):
                  return None

              return u

          with sync_playwright() as p:

              browser = p.chromium.launch(
                  headless=True,
                  args=[
                      "--no-sandbox",
                      "--disable-dev-shm-usage"
                  ]
              )

              context = browser.new_context(
                  viewport={
                      "width": 1366,
                      "height": 768
                  },
                  user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/124 Safari/537.36"
              )

              page = context.new_page()

              def capture_response(response):

                  try:

                      u = clean(response.url)

                      if u:
                          media.add(u)

                  except:
                      pass

              def capture_request(request):

                  try:

                      u = clean(request.url)

                      if u:
                          media.add(u)

                  except:
                      pass

              page.on("response", capture_response)
              page.on("request", capture_request)

              try:

                  page.goto(
                      url,
                      wait_until="networkidle",
                      timeout=120000
                  )

                  page.wait_for_timeout(12000)

                  html = page.content()

                  patterns = [
                      r'https?://[^\s"\'<>]+\.m3u8[^\s"\'<>]*',
                      r'https?://[^\s"\'<>]+\.mp4[^\s"\'<>]*',
                      r'https?://[^\s"\'<>]+\.mpd[^\s"\'<>]*'
                  ]

                  for ptn in patterns:

                      matches = re.findall(ptn, html)

                      for m in matches:

                          u = clean(m)

                          if u:
                              media.add(u)

              except Exception as e:

                  print(f"ERROR: {e}")

              browser.close()

          print(json.dumps(sorted(media)))
          PY

      - name: Download Videos
        run: |

          set +e

          mkdir -p downloads

          while IFS= read -r URL
          do

            [ -z "$URL" ] && continue

            echo ""
            echo "=================================="
            echo "PROCESSING"
            echo "$URL"
            echo "=================================="

            ID=$(date +%s)_$RANDOM

            DIR="downloads/$ID"

            mkdir -p "$DIR"

            python3 extractor.py "$URL" > "$DIR/media.json"

            echo ""
            echo "========== FOUND MEDIA =========="
            cat "$DIR/media.json"

            jq -r '.[]' "$DIR/media.json" > "$DIR/media.txt"

            grep -Ei '^https?://' "$DIR/media.txt" | \
            grep -v ',.mp4' | \
            grep -v '&amp;' | \
            grep -v 'deep_pixel' | \
            grep -v 'analytics' | \
            grep -v 'tracker' | \
            sort -u > "$DIR/filtered.txt"

            mv "$DIR/filtered.txt" "$DIR/media.txt"

            echo ""
            echo "========== FILTERED MEDIA =========="
            cat "$DIR/media.txt"

            SUCCESS=0

            while IFS= read -r STREAM
            do

              [ -z "$STREAM" ] && continue

              echo ""
              echo "=================================="
              echo "TRYING STREAM"
              echo "$STREAM"
              echo "=================================="

              yt-dlp \
                --ignore-errors \
                --retries 20 \
                --fragment-retries 20 \
                --concurrent-fragments 8 \
                --merge-output-format mp4 \
                --remux-video mp4 \
                --downloader aria2c \
                --downloader-args "aria2c:-x 8 -s 8 -k 1M" \
                -S "res,fps,br" \
                -f "bestvideo+bestaudio/best" \
                -o "$DIR/video.%(ext)s" \
                "$STREAM"

              FILE=$(find "$DIR" -type f \( -iname "*.mp4" -o -iname "*.mkv" -o -iname "*.webm" \) | head -n1)

              if [ ! -z "$FILE" ]; then

                SIZE=$(stat -c%s "$FILE" 2>/dev/null || echo 0)

                echo ""
                echo "FOUND FILE:"
                echo "$FILE"

                echo ""
                echo "FILE SIZE:"
                echo "$SIZE"

                if [ "$SIZE" -lt 1048576 ]; then

                  echo ""
                  echo "FILE TOO SMALL -> REMOVED"

                  rm -f "$FILE"

                else

                  echo ""
                  echo "DOWNLOAD SUCCESS"

                  SUCCESS=1

                  break

                fi

              else

                echo ""
                echo "NO VIDEO FILE CREATED"

              fi

            done < "$DIR/media.txt"

            if [ "$SUCCESS" -eq 0 ]; then

              echo ""
              echo "NO VALID VIDEO DOWNLOADED"

            fi

            echo ""
            echo "========== FINAL FILES =========="
            find "$DIR" -type f | sort

          done < urls.txt

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: ultra-stable-downloads
          path: downloads
